# ---------------------------------------------------------------------------
# Query Type
# ---------------------------------------------------------------------------

type Query {
  """Fetch a single model by its Hub ID (e.g. 'mistralai/Mistral-7B-v0.1')."""
  model(id: ID!): Model

  """List models with optional filters."""
  models(filter: ModelFilter, limit: Int, offset: Int): [Model!]!

  """Fetch a single dataset by its Hub ID."""
  dataset(id: ID!): Dataset

  """List datasets with optional filters."""
  datasets(filter: DatasetFilter, limit: Int, offset: Int): [Dataset!]!

  """Fetch a single Space by its Hub ID."""
  space(id: ID!): Space

  """List spaces with optional filters."""
  spaces(filter: SpaceFilter, limit: Int, offset: Int): [Space!]!

  """Fetch a user profile by username."""
  user(username: String!): User

  """Fetch the currently authenticated user's profile."""
  me: User

  """Fetch an organization by name."""
  organization(name: String!): Organization

  """Fetch a specific inference endpoint by namespace and name."""
  inferenceEndpoint(namespace: String!, name: String!): InferenceEndpoint

  """List all inference endpoints for a namespace."""
  inferenceEndpoints(namespace: String!): [InferenceEndpoint!]!

  """List available splits for a dataset."""
  datasetSplits(dataset: String!, config: String): [DatasetSplit!]!

  """Fetch paginated rows from a dataset split."""
  datasetRows(dataset: String!, config: String!, split: String!, offset: Int, length: Int): DatasetContent

  """Search within a dataset split using full-text search."""
  datasetSearch(dataset: String!, config: String!, split: String!, query: String!, offset: Int, length: Int): [DatasetSearchResult!]!

  """Fetch column statistics for a dataset split."""
  datasetStatistics(dataset: String!, config: String!, split: String!): [DatasetStatistics!]!

  """List Parquet files for a dataset."""
  parquetFiles(dataset: String!, config: String, split: String): [ParquetFile!]!

  """List available inference pipeline tasks."""
  pipelines: [Pipeline!]!

  """Fetch the current user's webhooks."""
  webhooks: [Webhook!]!

  """Fetch a single webhook by ID."""
  webhook(id: ID!): Webhook
}

# ---------------------------------------------------------------------------
# Mutation Type
# ---------------------------------------------------------------------------

type Mutation {
  """Create a new model, dataset, or space repository."""
  createRepository(input: CreateRepositoryInput!): Repository!

  """Delete a repository."""
  deleteRepository(id: ID!, type: RepositoryType!): Boolean!

  """Toggle a repository's public/private visibility."""
  updateRepositoryVisibility(id: ID!, type: RepositoryType!, private: Boolean!): Repository!

  """Commit one or more file operations to a repository."""
  createCommit(input: CreateCommitInput!): CommitInfo!

  """Open a pull request against a repository."""
  createPullRequest(input: CreatePullRequestInput!): PullRequest!

  """Merge an open pull request."""
  mergePullRequest(repoId: String!, repoType: RepositoryType!, number: Int!): PullRequest!

  """Close a pull request without merging."""
  closePullRequest(repoId: String!, repoType: RepositoryType!, number: Int!): PullRequest!

  """Open a discussion thread on a repository."""
  createDiscussion(input: CreateDiscussionInput!): Discussion!

  """Add a comment to an existing discussion or pull request."""
  addComment(repoId: String!, repoType: RepositoryType!, discussionNumber: Int!, body: String!): Comment!

  """Provision a new dedicated inference endpoint."""
  createInferenceEndpoint(input: CreateEndpointInput!): InferenceEndpoint!

  """Update an existing inference endpoint's configuration."""
  updateInferenceEndpoint(namespace: String!, name: String!, input: UpdateEndpointInput!): InferenceEndpoint!

  """Delete an inference endpoint."""
  deleteInferenceEndpoint(namespace: String!, name: String!): Boolean!

  """Pause a running inference endpoint to stop billing."""
  pauseInferenceEndpoint(namespace: String!, name: String!): InferenceEndpoint!

  """Resume a paused inference endpoint."""
  resumeInferenceEndpoint(namespace: String!, name: String!): InferenceEndpoint!

  """Run serverless inference via the Inference API."""
  runInference(model: String!, inputs: JSON!, parameters: JSON, options: JSON): InferenceOutput!

  """Register a new webhook for Hub events."""
  createWebhook(input: CreateWebhookInput!): Webhook!

  """Update an existing webhook."""
  updateWebhook(id: ID!, input: CreateWebhookInput!): Webhook!

  """Delete a webhook."""
  deleteWebhook(id: ID!): Boolean!
}
