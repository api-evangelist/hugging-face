naftiko: 1.0.0-alpha2
info:
  label: Hugging Face Text Generation Inference API — Chat
  description: 'Hugging Face Text Generation Inference API — Chat. 1 operations. Lead operation: Create Chat Completion (openai
    Compatible). Self-contained Naftiko capability covering one Hugging Face business surface.'
  tags:
  - Hugging Face
  - Chat
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    HUGGING_FACE_API_KEY: HUGGING_FACE_API_KEY
capability:
  consumes:
  - type: http
    namespace: text-generation-inference-chat
    baseUri: https://api-inference.huggingface.co
    description: Hugging Face Text Generation Inference API — Chat business capability. Self-contained, no shared references.
    resources:
    - name: v1-chat-completions
      path: /v1/chat/completions
      operations:
      - name: chatcompletions
        method: POST
        description: Create Chat Completion (openai Compatible)
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    authentication:
      type: bearer
      token: '{{env.HUGGING_FACE_API_KEY}}'
  exposes:
  - type: rest
    namespace: text-generation-inference-chat-rest
    port: 8080
    description: REST adapter for Hugging Face Text Generation Inference API — Chat. One Spectral-compliant resource per consumed
      operation, prefixed with /v1.
    resources:
    - path: /v1/v1/chat/completions
      name: v1-chat-completions
      description: REST surface for v1-chat-completions.
      operations:
      - method: POST
        name: chatcompletions
        description: Create Chat Completion (openai Compatible)
        call: text-generation-inference-chat.chatcompletions
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: text-generation-inference-chat-mcp
    port: 9090
    transport: http
    description: MCP adapter for Hugging Face Text Generation Inference API — Chat. One tool per consumed operation, routed
      inline through this capability's consumes block.
    tools:
    - name: create-chat-completion-openai-compatible
      description: Create Chat Completion (openai Compatible)
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: text-generation-inference-chat.chatcompletions
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
