naftiko: "1.0.0-alpha1"

info:
  label: "Hugging Face Dataset Viewer API"
  description: "Query and visualize datasets stored on the Hugging Face Hub through a lightweight REST API."
  tags:
    - Hugging Face
    - Datasets
    - Data Exploration
    - Viewer
  created: "2026-04-18"
  modified: "2026-04-18"

binds:
  - namespace: env
    keys:
      HF_API_TOKEN: HF_API_TOKEN

capability:
  consumes:
    - type: http
      namespace: hf-dataset-viewer
      baseUri: https://datasets-server.huggingface.co
      description: "Query and visualize datasets without downloading the entire dataset."
      authentication:
        type: bearer
        token: "{{HF_API_TOKEN}}"
      resources:
        - name: validity
          path: /is-valid
          description: "Check dataset validity"
          operations:
            - name: is-valid
              method: GET
              description: "Check if a dataset is valid and available."
              inputParameters:
                - name: dataset
                  in: query
                  type: string
                  required: true
                  description: "The dataset name"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
        - name: splits
          path: /splits
          description: "Get dataset splits"
          operations:
            - name: get-splits
              method: GET
              description: "Get the list of splits for a dataset."
              inputParameters:
                - name: dataset
                  in: query
                  type: string
                  required: true
                  description: "The dataset name"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
        - name: first-rows
          path: /first-rows
          description: "Get first rows preview"
          operations:
            - name: get-first-rows
              method: GET
              description: "Get the first rows of a dataset split."
              inputParameters:
                - name: dataset
                  in: query
                  type: string
                  required: true
                  description: "The dataset name"
                - name: config
                  in: query
                  type: string
                  required: true
                  description: "The dataset configuration"
                - name: split
                  in: query
                  type: string
                  required: true
                  description: "The dataset split"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
        - name: rows
          path: /rows
          description: "Get dataset rows"
          operations:
            - name: get-rows
              method: GET
              description: "Get rows from a dataset split with pagination."
              inputParameters:
                - name: dataset
                  in: query
                  type: string
                  required: true
                  description: "The dataset name"
                - name: config
                  in: query
                  type: string
                  required: true
                  description: "The dataset configuration"
                - name: split
                  in: query
                  type: string
                  required: true
                  description: "The dataset split"
                - name: offset
                  in: query
                  type: integer
                  required: false
                  description: "Row offset"
                - name: length
                  in: query
                  type: integer
                  required: false
                  description: "Number of rows"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
        - name: search
          path: /search
          description: "Search dataset rows"
          operations:
            - name: search-rows
              method: GET
              description: "Search for rows matching a query."
              inputParameters:
                - name: dataset
                  in: query
                  type: string
                  required: true
                  description: "The dataset name"
                - name: config
                  in: query
                  type: string
                  required: true
                  description: "The dataset configuration"
                - name: split
                  in: query
                  type: string
                  required: true
                  description: "The dataset split"
                - name: query
                  in: query
                  type: string
                  required: true
                  description: "Search query"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
        - name: filter
          path: /filter
          description: "Filter dataset rows"
          operations:
            - name: filter-rows
              method: GET
              description: "Filter rows using a condition."
              inputParameters:
                - name: dataset
                  in: query
                  type: string
                  required: true
                  description: "The dataset name"
                - name: config
                  in: query
                  type: string
                  required: true
                  description: "The dataset configuration"
                - name: split
                  in: query
                  type: string
                  required: true
                  description: "The dataset split"
                - name: where
                  in: query
                  type: string
                  required: true
                  description: "Filter condition"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
        - name: parquet
          path: /parquet
          description: "Get parquet files"
          operations:
            - name: get-parquet-files
              method: GET
              description: "Get Parquet file URLs for a dataset."
              inputParameters:
                - name: dataset
                  in: query
                  type: string
                  required: true
                  description: "The dataset name"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
        - name: size
          path: /size
          description: "Get dataset size"
          operations:
            - name: get-dataset-size
              method: GET
              description: "Get size information for a dataset."
              inputParameters:
                - name: dataset
                  in: query
                  type: string
                  required: true
                  description: "The dataset name"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
        - name: statistics
          path: /statistics
          description: "Get dataset statistics"
          operations:
            - name: get-statistics
              method: GET
              description: "Get statistical information about a dataset."
              inputParameters:
                - name: dataset
                  in: query
                  type: string
                  required: true
                  description: "The dataset name"
                - name: config
                  in: query
                  type: string
                  required: true
                  description: "The dataset configuration"
                - name: split
                  in: query
                  type: string
                  required: true
                  description: "The dataset split"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
        - name: croissant
          path: /croissant
          description: "Get Croissant metadata"
          operations:
            - name: get-croissant-metadata
              method: GET
              description: "Get Croissant metadata for a dataset."
              inputParameters:
                - name: dataset
                  in: query
                  type: string
                  required: true
                  description: "The dataset name"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

  exposes:
    - type: rest
      port: 8104
      namespace: hf-dataset-viewer-api
      resources:
        - path: /v1/datasets/{dataset}/validity
          name: validity
          description: "Check dataset validity"
          operations:
            - method: GET
              name: check-validity
              description: "Check if a dataset is valid"
              call: "hf-dataset-viewer.is-valid"
              with:
                dataset: "rest.dataset"
              outputParameters:
                - type: object
                  mapping: "$."

    - type: mcp
      port: 9104
      namespace: hf-dataset-viewer-mcp
      transport: http
      tools:
        - name: check-dataset-validity
          description: "Check if a dataset is valid and available on the Hub."
          hints:
            readOnly: true
          call: "hf-dataset-viewer.is-valid"
          with:
            dataset: "tools.dataset"
          outputParameters:
            - type: object
              mapping: "$."
        - name: get-dataset-splits
          description: "Get the list of splits for a dataset."
          hints:
            readOnly: true
          call: "hf-dataset-viewer.get-splits"
          with:
            dataset: "tools.dataset"
          outputParameters:
            - type: object
              mapping: "$."
        - name: preview-dataset-rows
          description: "Get the first rows of a dataset split for preview."
          hints:
            readOnly: true
          call: "hf-dataset-viewer.get-first-rows"
          with:
            dataset: "tools.dataset"
            config: "tools.config"
            split: "tools.split"
          outputParameters:
            - type: object
              mapping: "$."
        - name: get-dataset-rows
          description: "Get rows from a dataset split with pagination."
          hints:
            readOnly: true
          call: "hf-dataset-viewer.get-rows"
          with:
            dataset: "tools.dataset"
            config: "tools.config"
            split: "tools.split"
            offset: "tools.offset"
            length: "tools.length"
          outputParameters:
            - type: object
              mapping: "$."
        - name: search-dataset
          description: "Search for rows matching a query in a dataset."
          hints:
            readOnly: true
          call: "hf-dataset-viewer.search-rows"
          with:
            dataset: "tools.dataset"
            config: "tools.config"
            split: "tools.split"
            query: "tools.query"
          outputParameters:
            - type: object
              mapping: "$."
        - name: filter-dataset
          description: "Filter dataset rows using a condition."
          hints:
            readOnly: true
          call: "hf-dataset-viewer.filter-rows"
          with:
            dataset: "tools.dataset"
            config: "tools.config"
            split: "tools.split"
            where: "tools.where"
          outputParameters:
            - type: object
              mapping: "$."
        - name: get-parquet-files
          description: "Get Parquet file URLs for a dataset."
          hints:
            readOnly: true
          call: "hf-dataset-viewer.get-parquet-files"
          with:
            dataset: "tools.dataset"
          outputParameters:
            - type: object
              mapping: "$."
        - name: get-dataset-size
          description: "Get size information for a dataset."
          hints:
            readOnly: true
          call: "hf-dataset-viewer.get-dataset-size"
          with:
            dataset: "tools.dataset"
          outputParameters:
            - type: object
              mapping: "$."
        - name: get-dataset-statistics
          description: "Get statistical information about a dataset split."
          hints:
            readOnly: true
          call: "hf-dataset-viewer.get-statistics"
          with:
            dataset: "tools.dataset"
            config: "tools.config"
            split: "tools.split"
          outputParameters:
            - type: object
              mapping: "$."
        - name: get-croissant-metadata
          description: "Get Croissant metadata for a dataset."
          hints:
            readOnly: true
          call: "hf-dataset-viewer.get-croissant-metadata"
          with:
            dataset: "tools.dataset"
          outputParameters:
            - type: object
              mapping: "$."
