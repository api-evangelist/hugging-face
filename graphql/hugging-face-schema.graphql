"""
Hugging Face GraphQL Schema

Conceptual GraphQL schema modeling the Hugging Face platform APIs:
- Hub API (https://huggingface.co/api)
- Inference API (https://api-inference.huggingface.co)
- Inference Endpoints API (https://api.endpoints.huggingface.cloud)
- Dataset Viewer API (https://datasets-server.huggingface.co)

This is a conceptual schema. Hugging Face does not currently expose a native
GraphQL endpoint. This schema is intended for use in GraphQL gateway layers,
federation designs, and developer tooling built on top of the REST APIs.
"""

schema {
  query: Query
  mutation: Mutation
}

# ---------------------------------------------------------------------------
# Scalars
# ---------------------------------------------------------------------------

scalar DateTime
scalar JSON
scalar URL
scalar Upload

# ---------------------------------------------------------------------------
# Enums
# ---------------------------------------------------------------------------

enum RepositoryType {
  MODEL
  DATASET
  SPACE
}

enum Visibility {
  PUBLIC
  PRIVATE
}

enum SpaceSDK {
  GRADIO
  STREAMLIT
  DOCKER
  STATIC
}

enum SpaceStage {
  NO_APP_FILE
  CONFIG_ERROR
  BUILDING
  BUILD_ERROR
  APP_STARTING
  RUNNING
  RUNNING_BUILDING
  RUNTIME_ERROR
  DELETING
  STOPPED
  PAUSED
}

enum EndpointState {
  PENDING
  INITIALIZING
  UPDATING
  UPDATE_FAILED
  RUNNING
  PAUSED
  FAILED
  EXPIRED
  SCALED_TO_ZERO
}

enum EndpointType {
  PUBLIC
  PROTECTED
  PRIVATE
}

enum PipelineTask {
  TEXT_GENERATION
  TEXT2TEXT_GENERATION
  TEXT_CLASSIFICATION
  TOKEN_CLASSIFICATION
  QUESTION_ANSWERING
  SUMMARIZATION
  TRANSLATION
  FILL_MASK
  ZERO_SHOT_CLASSIFICATION
  FEATURE_EXTRACTION
  SENTENCE_SIMILARITY
  TABLE_QUESTION_ANSWERING
  IMAGE_CLASSIFICATION
  OBJECT_DETECTION
  IMAGE_SEGMENTATION
  DEPTH_ESTIMATION
  IMAGE_TO_IMAGE
  IMAGE_TO_TEXT
  TEXT_TO_IMAGE
  AUDIO_CLASSIFICATION
  AUTOMATIC_SPEECH_RECOGNITION
  TEXT_TO_SPEECH
  AUDIO_TO_AUDIO
  DOCUMENT_QUESTION_ANSWERING
  VISUAL_QUESTION_ANSWERING
}

enum PullRequestStatus {
  OPEN
  CLOSED
  MERGED
}

enum TokenType {
  READ
  WRITE
  FINE_GRAINED
}

enum MemberRole {
  READ
  WRITE
  CONTRIBUTOR
  ADMIN
}

# ---------------------------------------------------------------------------
# Repository and Hub Types
# ---------------------------------------------------------------------------

"""A machine learning model repository on the Hugging Face Hub."""
type Model {
  id: ID!
  modelId: String!
  author: String
  sha: String
  lastModified: DateTime
  private: Boolean!
  disabled: Boolean
  gated: Boolean
  pipeline_tag: PipelineTask
  tags: [String!]
  downloads: Int
  likes: Int
  library_name: String
  info: ModelInfo
  files: [ModelFile!]
  card: ModelCard
  evaluations: [ModelEvaluation!]
  commits(limit: Int): [Commit!]
  branches: [Branch!]
  tags_list: [Tag!]
  pullRequests(status: PullRequestStatus): [PullRequest!]
  discussions: [Discussion!]
}

"""Detailed metadata for a model including pipeline configuration and card data."""
type ModelInfo {
  id: ID!
  modelId: String!
  sha: String
  pipeline_tag: PipelineTask
  tags: [String!]
  cardData: JSON
  config: JSON
  transformersInfo: JSON
  widgetData: JSON
  safetensors: JSON
  author: String
  downloads: Int
  downloadsAllTime: Int
  likes: Int
  trendingScore: Float
  createdAt: DateTime
  lastModified: DateTime
  library_name: String
  license: String
  language: [String!]
  datasets: [String!]
  metrics: [String!]
  baseModel: String
  masked: Boolean
  spaces: [String!]
}

"""A single file within a model repository."""
type ModelFile {
  rfilename: String!
  size: Int
  blobId: String
  lfs: LFSFile
  lastCommit: CommitInfo
  security: FileSecurity
}

"""Metadata for a file stored via Git LFS."""
type LFSFile {
  sha256: String!
  size: Int!
  pointerSize: Int
}

"""Security scan result for a repository file."""
type FileSecurity {
  safe: Boolean!
  avScan: JSON
  pickleImportScan: JSON
}

"""Structured metadata parsed from a model's README model card."""
type ModelCard {
  language: [String!]
  license: String
  tags: [String!]
  datasets: [String!]
  metrics: [String!]
  pipeline_tag: String
  baseModel: String
  modelIndex: JSON
  co2EqEmissions: JSON
  widgetData: JSON
}

"""Evaluation results attached to a model."""
type ModelEvaluation {
  task: String!
  dataset: String!
  metric: String!
  value: Float
  verified: Boolean
}

# ---------------------------------------------------------------------------

