naftiko: "1.0.0-alpha1"

info:
  label: "Hugging Face Hub API"
  description: "Programmatically interact with the Hugging Face Hub to manage models, datasets, spaces, and repositories."
  tags:
    - Hugging Face
    - Hub
    - Models
    - Datasets
  created: "2026-04-18"
  modified: "2026-04-18"

binds:
  - namespace: env
    keys:
      HF_API_TOKEN: HF_API_TOKEN

capability:
  consumes:
    - type: http
      namespace: hf-hub
      baseUri: https://huggingface.co/api
      description: "Manage models, datasets, spaces, and repositories on the Hugging Face Hub."
      authentication:
        type: bearer
        token: "{{HF_API_TOKEN}}"
      resources:
        - name: models
          path: /models
          description: "List and search models"
          operations:
            - name: list-models
              method: GET
              description: "List models on the Hub with optional filtering."
              inputParameters:
                - name: search
                  in: query
                  type: string
                  required: false
                  description: "Search query string"
                - name: author
                  in: query
                  type: string
                  required: false
                  description: "Filter by author/organization"
                - name: filter
                  in: query
                  type: string
                  required: false
                  description: "Filter by tags"
                - name: sort
                  in: query
                  type: string
                  required: false
                  description: "Sort field"
                - name: direction
                  in: query
                  type: string
                  required: false
                  description: "Sort direction"
                - name: limit
                  in: query
                  type: integer
                  required: false
                  description: "Maximum number of results"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
        - name: model-by-id
          path: /models/{repo_id}
          description: "Get model details"
          operations:
            - name: get-model
              method: GET
              description: "Get detailed information about a specific model."
              inputParameters:
                - name: repo_id
                  in: path
                  type: string
                  required: true
                  description: "The model repository ID"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
        - name: model-revision
          path: /models/{repo_id}/revision/{revision}
          description: "Get model at specific revision"
          operations:
            - name: get-model-revision
              method: GET
              description: "Get model information at a specific revision."
              inputParameters:
                - name: repo_id
                  in: path
                  type: string
                  required: true
                  description: "The model repository ID"
                - name: revision
                  in: path
                  type: string
                  required: true
                  description: "The revision (branch, tag, or commit)"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
        - name: datasets
          path: /datasets
          description: "List and search datasets"
          operations:
            - name: list-datasets
              method: GET
              description: "List datasets on the Hub with optional filtering."
              inputParameters:
                - name: search
                  in: query
                  type: string
                  required: false
                  description: "Search query string"
                - name: author
                  in: query
                  type: string
                  required: false
                  description: "Filter by author/organization"
                - name: filter
                  in: query
                  type: string
                  required: false
                  description: "Filter by tags"
                - name: sort
                  in: query
                  type: string
                  required: false
                  description: "Sort field"
                - name: limit
                  in: query
                  type: integer
                  required: false
                  description: "Maximum number of results"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
        - name: dataset-by-id
          path: /datasets/{repo_id}
          description: "Get dataset details"
          operations:
            - name: get-dataset
              method: GET
              description: "Get detailed information about a specific dataset."
              inputParameters:
                - name: repo_id
                  in: path
                  type: string
                  required: true
                  description: "The dataset repository ID"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
        - name: dataset-parquet
          path: /datasets/{repo_id}/parquet
          description: "Get dataset parquet files"
          operations:
            - name: get-dataset-parquet
              method: GET
              description: "Get parquet file URLs for a dataset."
              inputParameters:
                - name: repo_id
                  in: path
                  type: string
                  required: true
                  description: "The dataset repository ID"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
        - name: spaces
          path: /spaces
          description: "List and search spaces"
          operations:
            - name: list-spaces
              method: GET
              description: "List Spaces on the Hub with optional filtering."
              inputParameters:
                - name: search
                  in: query
                  type: string
                  required: false
                  description: "Search query string"
                - name: author
                  in: query
                  type: string
                  required: false
                  description: "Filter by author/organization"
                - name: sort
                  in: query
                  type: string
                  required: false
                  description: "Sort field"
                - name: limit
                  in: query
                  type: integer
                  required: false
                  description: "Maximum number of results"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
        - name: space-by-id
          path: /spaces/{repo_id}
          description: "Get space details"
          operations:
            - name: get-space
              method: GET
              description: "Get detailed information about a specific Space."
              inputParameters:
                - name: repo_id
                  in: path
                  type: string
                  required: true
                  description: "The space repository ID"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
        - name: repos-create
          path: /repos/create
          description: "Create repositories"
          operations:
            - name: create-repo
              method: POST
              description: "Create a new repository on the Hub."
              inputParameters: []
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
              body:
                type: json
                data:
                  type: "{{tools.type}}"
                  name: "{{tools.name}}"
                  organization: "{{tools.organization}}"
                  private: "{{tools.private}}"
        - name: repos-delete
          path: /repos/delete
          description: "Delete repositories"
          operations:
            - name: delete-repo
              method: DELETE
              description: "Delete a repository from the Hub."
              inputParameters: []
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
              body:
                type: json
                data:
                  type: "{{tools.type}}"
                  name: "{{tools.name}}"
                  organization: "{{tools.organization}}"
        - name: repo-settings
          path: /repos/{repo_type}/{repo_id}/settings
          description: "Update repository settings"
          operations:
            - name: update-repo-settings
              method: PUT
              description: "Update settings for a repository."
              inputParameters:
                - name: repo_type
                  in: path
                  type: string
                  required: true
                  description: "Repository type (model, dataset, space)"
                - name: repo_id
                  in: path
                  type: string
                  required: true
                  description: "The repository ID"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
              body:
                type: json
                data:
                  private: "{{tools.private}}"
        - name: whoami
          path: /whoami-v2
          description: "Get current user info"
          operations:
            - name: whoami
              method: GET
              description: "Get information about the authenticated user."
              inputParameters: []
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
        - name: metrics
          path: /metrics
          description: "List available metrics"
          operations:
            - name: list-metrics
              method: GET
              description: "List all available evaluation metrics."
              inputParameters: []
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
        - name: model-tags
          path: /models-tags-by-type
          description: "List model tags"
          operations:
            - name: list-model-tags
              method: GET
              description: "List all model tags grouped by type."
              inputParameters: []
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
        - name: dataset-tags
          path: /datasets-tags-by-type
          description: "List dataset tags"
          operations:
            - name: list-dataset-tags
              method: GET
              description: "List all dataset tags grouped by type."
              inputParameters: []
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

  exposes:
    - type: rest
      port: 8101
      namespace: hf-hub-api
      resources:
        - path: /v1/models
          name: models
          description: "Manage models"
          operations:
            - method: GET
              name: list-models
              description: "List models"
              call: "hf-hub.list-models"
              with:
                search: "rest.search"
                author: "rest.author"
                limit: "rest.limit"
              outputParameters:
                - type: object
                  mapping: "$."

    - type: mcp
      port: 9101
      namespace: hf-hub-mcp
      transport: http
      tools:
        - name: list-models
          description: "List and search models on the Hugging Face Hub."
          hints:
            readOnly: true
            openWorld: true
          call: "hf-hub.list-models"
          with:
            search: "tools.search"
            author: "tools.author"
            filter: "tools.filter"
            sort: "tools.sort"
            limit: "tools.limit"
          outputParameters:
            - type: object
              mapping: "$."
        - name: get-model
          description: "Get detailed information about a specific model."
          hints:
            readOnly: true
            openWorld: true
          call: "hf-hub.get-model"
          with:
            repo_id: "tools.repo_id"
          outputParameters:
            - type: object
              mapping: "$."
        - name: list-datasets
          description: "List and search datasets on the Hub."
          hints:
            readOnly: true
            openWorld: true
          call: "hf-hub.list-datasets"
          with:
            search: "tools.search"
            author: "tools.author"
            limit: "tools.limit"
          outputParameters:
            - type: object
              mapping: "$."
        - name: get-dataset
          description: "Get detailed information about a specific dataset."
          hints:
            readOnly: true
            openWorld: true
          call: "hf-hub.get-dataset"
          with:
            repo_id: "tools.repo_id"
          outputParameters:
            - type: object
              mapping: "$."
        - name: list-spaces
          description: "List and search Spaces on the Hub."
          hints:
            readOnly: true
            openWorld: true
          call: "hf-hub.list-spaces"
          with:
            search: "tools.search"
            author: "tools.author"
            limit: "tools.limit"
          outputParameters:
            - type: object
              mapping: "$."
        - name: create-repo
          description: "Create a new repository on the Hub."
          hints:
            readOnly: false
          call: "hf-hub.create-repo"
          with:
            type: "tools.type"
            name: "tools.name"
            organization: "tools.organization"
            private: "tools.private"
          outputParameters:
            - type: object
              mapping: "$."
        - name: delete-repo
          description: "Delete a repository from the Hub."
          hints:
            readOnly: false
            destructive: true
          call: "hf-hub.delete-repo"
          with:
            type: "tools.type"
            name: "tools.name"
            organization: "tools.organization"
          outputParameters:
            - type: object
              mapping: "$."
        - name: whoami
          description: "Get information about the authenticated user."
          hints:
            readOnly: true
          call: "hf-hub.whoami"
          outputParameters:
            - type: object
              mapping: "$."
