naftiko: "1.0.0-alpha1"

info:
  label: "Hugging Face Inference API"
  description: "Run inference on 200,000+ machine learning models hosted on the Hugging Face Hub with a simple HTTP request."
  tags:
    - Hugging Face
    - Machine Learning
    - Inference
    - AI
  created: "2026-04-18"
  modified: "2026-04-18"

binds:
  - namespace: env
    keys:
      HF_API_TOKEN: HF_API_TOKEN

capability:
  consumes:
    - type: http
      namespace: hf-inference
      baseUri: https://api-inference.huggingface.co
      description: "Run inference on ML models hosted on the Hugging Face Hub."
      authentication:
        type: bearer
        token: "{{HF_API_TOKEN}}"
      resources:
        - name: model-inference
          path: /models/{model_id}
          description: "Run inference on a specific model"
          operations:
            - name: run-inference
              method: POST
              description: "Run inference on any model hosted on the Hugging Face Hub."
              inputParameters:
                - name: model_id
                  in: path
                  type: string
                  required: true
                  description: "The model ID on the Hugging Face Hub"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
              body:
                type: json
                data:
                  inputs: "{{tools.inputs}}"
                  parameters: "{{tools.parameters}}"
                  options: "{{tools.options}}"
        - name: pipeline-inference
          path: /pipeline/{task}
          description: "Run inference by pipeline task"
          operations:
            - name: run-pipeline-inference
              method: POST
              description: "Run inference using a specific pipeline task."
              inputParameters:
                - name: task
                  in: path
                  type: string
                  required: true
                  description: "The pipeline task name"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
              body:
                type: json
                data:
                  inputs: "{{tools.inputs}}"
                  parameters: "{{tools.parameters}}"
        - name: text-generation
          path: /models/{model_id}/text-generation
          description: "Text generation inference"
          operations:
            - name: text-generation
              method: POST
              description: "Generate text using a language model."
              inputParameters:
                - name: model_id
                  in: path
                  type: string
                  required: true
                  description: "The model ID"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
              body:
                type: json
                data:
                  inputs: "{{tools.inputs}}"
                  parameters: "{{tools.parameters}}"
        - name: text-classification
          path: /models/{model_id}/text-classification
          description: "Text classification inference"
          operations:
            - name: text-classification
              method: POST
              description: "Classify text into predefined categories."
              inputParameters:
                - name: model_id
                  in: path
                  type: string
                  required: true
                  description: "The model ID"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
              body:
                type: json
                data:
                  inputs: "{{tools.inputs}}"
        - name: question-answering
          path: /models/{model_id}/question-answering
          description: "Question answering inference"
          operations:
            - name: question-answering
              method: POST
              description: "Answer questions based on provided context."
              inputParameters:
                - name: model_id
                  in: path
                  type: string
                  required: true
                  description: "The model ID"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
              body:
                type: json
                data:
                  inputs: "{{tools.inputs}}"
        - name: summarization
          path: /models/{model_id}/summarization
          description: "Text summarization inference"
          operations:
            - name: summarization
              method: POST
              description: "Summarize text content."
              inputParameters:
                - name: model_id
                  in: path
                  type: string
                  required: true
                  description: "The model ID"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
              body:
                type: json
                data:
                  inputs: "{{tools.inputs}}"
                  parameters: "{{tools.parameters}}"
        - name: translation
          path: /models/{model_id}/translation
          description: "Text translation inference"
          operations:
            - name: translation
              method: POST
              description: "Translate text between languages."
              inputParameters:
                - name: model_id
                  in: path
                  type: string
                  required: true
                  description: "The model ID"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
              body:
                type: json
                data:
                  inputs: "{{tools.inputs}}"
        - name: fill-mask
          path: /models/{model_id}/fill-mask
          description: "Fill mask inference"
          operations:
            - name: fill-mask
              method: POST
              description: "Fill in masked tokens in text."
              inputParameters:
                - name: model_id
                  in: path
                  type: string
                  required: true
                  description: "The model ID"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
              body:
                type: json
                data:
                  inputs: "{{tools.inputs}}"
        - name: feature-extraction
          path: /models/{model_id}/feature-extraction
          description: "Feature extraction inference"
          operations:
            - name: feature-extraction
              method: POST
              description: "Extract feature vectors from text."
              inputParameters:
                - name: model_id
                  in: path
                  type: string
                  required: true
                  description: "The model ID"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
              body:
                type: json
                data:
                  inputs: "{{tools.inputs}}"
        - name: image-classification
          path: /models/{model_id}/image-classification
          description: "Image classification inference"
          operations:
            - name: image-classification
              method: POST
              description: "Classify images into categories."
              inputParameters:
                - name: model_id
                  in: path
                  type: string
                  required: true
                  description: "The model ID"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
              body:
                type: json
                data:
                  inputs: "{{tools.inputs}}"
        - name: object-detection
          path: /models/{model_id}/object-detection
          description: "Object detection inference"
          operations:
            - name: object-detection
              method: POST
              description: "Detect objects in images."
              inputParameters:
                - name: model_id
                  in: path
                  type: string
                  required: true
                  description: "The model ID"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
              body:
                type: json
                data:
                  inputs: "{{tools.inputs}}"
        - name: speech-recognition
          path: /models/{model_id}/automatic-speech-recognition
          description: "Automatic speech recognition"
          operations:
            - name: automatic-speech-recognition
              method: POST
              description: "Transcribe audio to text."
              inputParameters:
                - name: model_id
                  in: path
                  type: string
                  required: true
                  description: "The model ID"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
              body:
                type: json
                data:
                  inputs: "{{tools.inputs}}"
        - name: text-to-image
          path: /models/{model_id}/text-to-image
          description: "Text to image generation"
          operations:
            - name: text-to-image
              method: POST
              description: "Generate images from text prompts."
              inputParameters:
                - name: model_id
                  in: path
                  type: string
                  required: true
                  description: "The model ID"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
              body:
                type: json
                data:
                  inputs: "{{tools.inputs}}"
                  parameters: "{{tools.parameters}}"
        - name: zero-shot-classification
          path: /models/{model_id}/zero-shot-classification
          description: "Zero-shot classification"
          operations:
            - name: zero-shot-classification
              method: POST
              description: "Classify text without predefined training labels."
              inputParameters:
                - name: model_id
                  in: path
                  type: string
                  required: true
                  description: "The model ID"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
              body:
                type: json
                data:
                  inputs: "{{tools.inputs}}"
                  parameters: "{{tools.parameters}}"
        - name: sentence-similarity
          path: /models/{model_id}/sentence-similarity
          description: "Sentence similarity"
          operations:
            - name: sentence-similarity
              method: POST
              description: "Compute similarity between sentences."
              inputParameters:
                - name: model_id
                  in: path
                  type: string
                  required: true
                  description: "The model ID"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
              body:
                type: json
                data:
                  inputs: "{{tools.inputs}}"

  exposes:
    - type: rest
      port: 8100
      namespace: hf-inference-api
      resources:
        - path: /v1/inference/{model_id}
          name: inference
          description: "Run inference on models"
          operations:
            - method: POST
              name: run-inference
              description: "Run inference on a model"
              call: "hf-inference.run-inference"
              with:
                model_id: "rest.model_id"
                inputs: "rest.inputs"
                parameters: "rest.parameters"
                options: "rest.options"
              outputParameters:
                - type: object
                  mapping: "$."

    - type: mcp
      port: 9100
      namespace: hf-inference-mcp
      transport: http
      tools:
        - name: run-inference
          description: "Run inference on any Hugging Face model."
          hints:
            readOnly: true
            openWorld: true
          call: "hf-inference.run-inference"
          with:
            model_id: "tools.model_id"
            inputs: "tools.inputs"
            parameters: "tools.parameters"
            options: "tools.options"
          outputParameters:
            - type: object
              mapping: "$."
        - name: text-generation
          description: "Generate text using a language model."
          hints:
            readOnly: true
            openWorld: true
          call: "hf-inference.text-generation"
          with:
            model_id: "tools.model_id"
            inputs: "tools.inputs"
            parameters: "tools.parameters"
          outputParameters:
            - type: object
              mapping: "$."
        - name: text-classification
          description: "Classify text into categories."
          hints:
            readOnly: true
            openWorld: true
          call: "hf-inference.text-classification"
          with:
            model_id: "tools.model_id"
            inputs: "tools.inputs"
          outputParameters:
            - type: object
              mapping: "$."
        - name: summarization
          description: "Summarize text content."
          hints:
            readOnly: true
            openWorld: true
          call: "hf-inference.summarization"
          with:
            model_id: "tools.model_id"
            inputs: "tools.inputs"
            parameters: "tools.parameters"
          outputParameters:
            - type: object
              mapping: "$."
        - name: translation
          description: "Translate text between languages."
          hints:
            readOnly: true
            openWorld: true
          call: "hf-inference.translation"
          with:
            model_id: "tools.model_id"
            inputs: "tools.inputs"
          outputParameters:
            - type: object
              mapping: "$."
        - name: image-classification
          description: "Classify images into categories."
          hints:
            readOnly: true
            openWorld: true
          call: "hf-inference.image-classification"
          with:
            model_id: "tools.model_id"
            inputs: "tools.inputs"
          outputParameters:
            - type: object
              mapping: "$."
        - name: text-to-image
          description: "Generate images from text prompts."
          hints:
            readOnly: true
            openWorld: true
          call: "hf-inference.text-to-image"
          with:
            model_id: "tools.model_id"
            inputs: "tools.inputs"
            parameters: "tools.parameters"
          outputParameters:
            - type: object
              mapping: "$."
