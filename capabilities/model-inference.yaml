naftiko: 1.0.0-alpha2
info:
  label: Hugging Face Model Inference
  description: Unified workflow for running AI/ML inference across Hugging Face APIs, combining the Inference API, Inference
    Providers, and Text Generation Inference for NLP, vision, audio, and multimodal tasks. Used by ML engineers and AI application
    developers.
  tags:
  - Hugging Face
  - Machine Learning
  - Inference
  - AI
  - Text Generation
  created: '2026-04-18'
  modified: '2026-05-06'
binds:
- namespace: env
  keys:
    HF_API_TOKEN: HF_API_TOKEN
capability:
  consumes:
  - type: http
    namespace: hf-inference
    baseUri: https://api-inference.huggingface.co
    description: Run inference on ML models hosted on the Hugging Face Hub.
    authentication:
      type: bearer
      token: '{{HF_API_TOKEN}}'
    resources:
    - name: model-inference
      path: /models/{model_id}
      description: Run inference on a specific model
      operations:
      - name: run-inference
        method: POST
        description: Run inference on any model hosted on the Hugging Face Hub.
        inputParameters:
        - name: model_id
          in: path
          type: string
          required: true
          description: The model ID on the Hugging Face Hub
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        body:
          type: json
          data:
            inputs: '{{tools.inputs}}'
            parameters: '{{tools.parameters}}'
            options: '{{tools.options}}'
    - name: pipeline-inference
      path: /pipeline/{task}
      description: Run inference by pipeline task
      operations:
