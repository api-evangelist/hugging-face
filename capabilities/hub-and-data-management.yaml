naftiko: 1.0.0-alpha2
info:
  label: Hugging Face Hub and Data Management
  description: Unified workflow for managing models, datasets, and spaces on the Hugging Face Hub, and exploring dataset contents
    via the Dataset Viewer. Used by ML engineers, data scientists, and platform administrators for model discovery, dataset
    curation, and repository management.
  tags:
  - Hugging Face
  - Hub
  - Models
  - Datasets
  - Data Management
  created: '2026-04-18'
  modified: '2026-05-06'
binds:
- namespace: env
  keys:
    HF_API_TOKEN: HF_API_TOKEN
capability:
  consumes:
  - type: http
    namespace: hf-hub
    baseUri: https://huggingface.co/api
    description: Manage models, datasets, spaces, and repositories on the Hugging Face Hub.
    authentication:
      type: bearer
      token: '{{HF_API_TOKEN}}'
    resources:
    - name: models
      path: /models
      description: List and search models
      operations:
      - name: list-models
        method: GET
        description: List models on the Hub with optional filtering.
        inputParameters:
        - name: search
          in: query
          type: string
          required: false
          description: Search query string
        - name: author
          in: query
          type: string
          required: false
          description: Filter by author/organization
        - name: filter
          in: query
          type: string
          required: false
          description: Filter by tags
        - name: sort
          in: query
          type: string
          required: false
          description: Sort field
        - name: direction
          in: query
          type: string
          required: false
          description: Sort direction
        - name: limit
          in: query
          type: integer
          required: false
          description: Maximum number of results
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: model-by-id
      path: /models/{repo_id}
      description: Get model details
      operations:
      - name: get-model
        method: GET
        description: Get detailed information about a specific model.
        inputParameters:
        - name: repo_id
          in: path
          type: string
          required: true
          description: The model repository ID
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: model-revision
      path: /models/{repo_id}/revision/{revision}
      description: Get model at specific revision
      operations:
      - name: get-model-revision
        method: GET
        description: Get model information at a specific revision.
        inputParameters:
        - name: repo_id
          in: path
          type: string
          required: true
          description: The model repository ID
        - name: revision
          in: path
          type: string
          required: true
          description: The revision (branch, tag, or commit)
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: datasets
      path: /datasets
      description: List and search datasets
      operations:
      - name: list-datasets
        method: GET
        description: List datasets on the Hub with optional filtering.
        inputParameters:
        - name: search
          in: query
          type: string
          required: false
          description: Search query string
        - name: author
          in: query
          type: string
          required: false
          description: Filter by author/organization
        - name: filter
          in: query
          type: string
          required: false
          description: Filter by tags
        - name: sort
          in: query
          type: string
          required: false
          description: Sort field
        - name: limit
          in: query
          type: integer
          required: false
          description: Maximum number of results
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: dataset-by-id
      path: /datasets/{repo_id}
      description: Get dataset details
      operations:
      - name: get-dataset
        method: GET
        description: Get detailed information about a specific dataset.
        inputParameters:
        - name: repo_id
          in: path
          type: string
          required: true
          description: The dataset repository ID
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: dataset-parquet
      path: /datasets/{repo_id}/parquet
      description: Get dataset parquet files
      operations:
      - name: get-dataset-parquet
        method: GET
        description: Get parquet file URLs for a dataset.
        inputParameters:
        - name: repo_id
          in: path
          type: string
          required: true
          description: The dataset repository ID
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: spaces
      path: /spaces
      description: List and search spaces
      operations:
      - name: list-spaces
        method: GET
        description: List Spaces on the Hub with optional filtering.
        inputParameters:
        - name: search
          in: query
          type: string
          required: false
          description: Search query string
        - name: author
          in: query
          type: string
          required: false
          description: Filter by author/organization
        - name: sort
          in: query
          type: string
          required: false
          description: Sort field
        - name: limit
          in: query
          type: integer
          required: false
          description: Maximum number of results
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: space-by-id
      path: /spaces/{repo_id}
      description: Get space details
      operations:
      - name: get-space
        method: GET
        description: Get detailed information about a specific Space.
        inputParameters:
        - name: repo_id
          in: path
          type: string
          required: true
          description: The space repository ID
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: repos-create
      path: /repos/create
      description: Create repositories
      operations:
      - name: create-repo
        method: POST
        description: Create a new repository on the Hub.
        inputParameters: []
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        body:
          type: json
          data:
            type: '{{tools.type}}'
            name: '{{tools.name}}'
            organization: '{{tools.organization}}'
            private: '{{tools.private}}'
    - name: repos-delete
      path: /repos/delete
      description: Delete repositories
      operations:
      - name: delete-repo
        method: DELETE
        description: Delete a repository from the Hub.
        inputParameters: []
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        body:
          type: json
          data:
            type: '{{tools.type}}'
            name: '{{tools.name}}'
            organization: '{{tools.organization}}'
    - name: repo-settings
      path: /repos/{repo_type}/{repo_id}/settings
      description: Update repository settings
      operations:
      - name: update-repo-settings
        method: PUT
        description: Update settings for a repository.
        inputParameters:
        - name: repo_type
          in: path
          type: string
          required: true
          description: Repository type (model, dataset, space)
        - name: repo_id
          in: path
          type: string
          required: true
          description: The repository ID
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        body:
          type: json
          data:
            private: '{{tools.private}}'
    - name: whoami
      path: /whoami-v2
      description: Get current user info
      operations:
      - name: whoami
        method: GET
        description: Get information about the authenticated user.
        inputParameters: []
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: metrics
      path: /metrics
      description: List available metrics
      operations:
      - name: list-metrics
        method: GET
        description: List all available evaluation metrics.
        inputParameters: []
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: model-tags
      path: /models-tags-by-type
      description: List model tags
      operations:
      - name: list-model-tags
        method: GET
        description: List all model tags grouped by type.
        inputParameters: []
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: dataset-tags
      path: /datasets-tags-by-type
      description: List dataset tags
      operations:
      - name: list-dataset-tags
        method: GET
        description: List all dataset tags grouped by type.
        inputParameters: []
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
  - type: http
    namespace: hf-dataset-viewer
    baseUri: https://datasets-server.huggingface.co
    description: Query and visualize datasets without downloading the entire dataset.
    authentication:
      type: bearer
      token: '{{HF_API_TOKEN}}'
    resources:
    - name: validity
      path: /is-valid
      description: Check dataset validity
      operations:
      - name: is-valid
        method: GET
        description: Check if a dataset is valid and available.
        inputParameters:
        - name: dataset
          in: query
          type: string
          required: true
          description: The dataset name
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: splits
      path: /splits
      description: Get dataset splits
      operations:
      - name: get-splits
        method: GET
        description: Get the list of splits for a dataset.
        inputParameters:
        - name: dataset
          in: query
          type: string
          required: true
          description: The dataset name
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: first-rows
      path: /first-rows
      description: Get first rows preview
      operations:
      - name: get-first-rows
        method: GET
        description: Get the first rows of a dataset split.
        inputParameters:
        - name: dataset
          in: query
          type: string
          required: true
          description: The dataset name
        - name: config
          in: query
          type: string
          required: true
          description: The dataset configuration
        - name: split
          in: query
          type: string
          required: true
          description: The dataset split
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: rows
      path: /rows
      description: Get dataset rows
      operations:
      - name: get-rows
        method: GET
        description: Get rows from a dataset split with pagination.
        inputParameters:
        - name: dataset
          in: query
          type: string
          required: true
          description: The dataset name
        - name: config
          in: query
          type: string
          required: true
          description: The dataset configuration
        - name: split
          in: query
          type: string
          required: true
          description: The dataset split
        - name: offset
          in: query
          type: integer
          required: false
          description: Row offset
        - name: length
          in: query
          type: integer
          required: false
          description: Number of rows
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: search
      path: /search
      description: Search dataset rows
      operations:
      - name: search-rows
        method: GET
        description: Search for rows matching a query.
        inputParameters:
        - name: dataset
          in: query
          type: string
          required: true
          description: The dataset name
        - name: config
          in: query
          type: string
          required: true
          description: The dataset configuration
        - name: split
          in: query
          type: string
          required: true
          description: The dataset split
        - name: query
          in: query
          type: string
          required: true
          description: Search query
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: filter
      path: /filter
      description: Filter dataset rows
      operations:
      - name: filter-rows
        method: GET
        description: Filter rows using a condition.
        inputParameters:
        - name: dataset
          in: query
          type: string
          required: true
          description: The dataset name
        - name: config
          in: query
          type: string
          required: true
          description: The dataset configuration
        - name: split
          in: query
          type: string
          required: true
          description: The dataset split
        - name: where
          in: query
          type: string
          required: true
          description: Filter condition
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: parquet
      path: /parquet
      description: Get parquet files
      operations:
      - name: get-parquet-files
        method: GET
        description: Get Parquet file URLs for a dataset.
        inputParameters:
        - name: dataset
          in: query
          type: string
          required: true
          description: The dataset name
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: size
      path: /size
      description: Get dataset size
      operations:
      - name: get-dataset-size
        method: GET
        description: Get size information for a dataset.
        inputParameters:
        - name: dataset
          in: query
          type: string
          required: true
          description: The dataset name
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: statistics
      path: /statistics
      description: Get dataset statistics
      operations:
      - name: get-statistics
        method: GET
        description: Get statistical information about a dataset.
        inputParameters:
        - name: dataset
          in: query
          type: string
          required: true
          description: The dataset name
        - name: config
          in: query
          type: string
          required: true
          description: The dataset configuration
        - name: split
          in: query
          type: string
          required: true
          description: The dataset split
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: croissant
      path: /croissant
      description: Get Croissant metadata
      operations:
      - name: get-croissant-metadata
        method: GET
        description: Get Croissant metadata for a dataset.
        inputParameters:
        - name: dataset
          in: query
          type: string
          required: true
          description: The dataset name
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
  exposes:
  - type: rest
    port: 8081
    namespace: hf-hub-data-api
    description: Unified REST API for Hugging Face Hub resource management and dataset exploration.
    resources:
    - path: /v1/models
      name: models
      description: Manage models on the Hub
      operations:
      - method: GET
        name: list-models
        description: List and search models
        call: hf-hub.list-models
        with:
          search: rest.search
          author: rest.author
          filter: rest.filter
          sort: rest.sort
          limit: rest.limit
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/models/{repo_id}
      name: model-details
      description: Get model details
      operations:
      - method: GET
        name: get-model
        description: Get model information
        call: hf-hub.get-model
        with:
          repo_id: rest.repo_id
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/datasets
      name: datasets
      description: Manage datasets on the Hub
      operations:
      - method: GET
        name: list-datasets
        description: List and search datasets
        call: hf-hub.list-datasets
        with:
          search: rest.search
          author: rest.author
          filter: rest.filter
          sort: rest.sort
          limit: rest.limit
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/datasets/{repo_id}
      name: dataset-details
      description: Get dataset details
      operations:
      - method: GET
        name: get-dataset
        description: Get dataset information
        call: hf-hub.get-dataset
        with:
          repo_id: rest.repo_id
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/datasets/{dataset}/rows
      name: dataset-rows
      description: Get dataset rows
      operations:
      - method: GET
        name: get-rows
        description: Get rows from a dataset
        call: hf-dataset-viewer.get-rows
        with:
          dataset: rest.dataset
          config: rest.config
          split: rest.split
          offset: rest.offset
          length: rest.length
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/datasets/{dataset}/search
      name: dataset-search
      description: Search dataset rows
      operations:
      - method: GET
        name: search-rows
        description: Search rows in a dataset
        call: hf-dataset-viewer.search-rows
        with:
          dataset: rest.dataset
          config: rest.config
          split: rest.split
          query: rest.query
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/spaces
      name: spaces
      description: Manage Spaces on the Hub
      operations:
      - method: GET
        name: list-spaces
        description: List and search Spaces
        call: hf-hub.list-spaces
        with:
          search: rest.search
          author: rest.author
          limit: rest.limit
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/repos
      name: repos
      description: Create repositories
      operations:
      - method: POST
        name: create-repo
        description: Create a new repository
        call: hf-hub.create-repo
        with:
          type: rest.type
          name: rest.name
          organization: rest.organization
          private: rest.private
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/user
      name: user
      description: User information
      operations:
      - method: GET
        name: whoami
        description: Get authenticated user info
        call: hf-hub.whoami
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    port: 9091
    namespace: hf-hub-data-mcp
    transport: http
    description: MCP server for AI-assisted Hugging Face Hub management and dataset exploration.
    tools:
    - name: list-models
      description: List and search ML models on the Hugging Face Hub.
      hints:
        readOnly: true
        openWorld: true
      call: hf-hub.list-models
      with:
        search: tools.search
        author: tools.author
        filter: tools.filter
        sort: tools.sort
        limit: tools.limit
      outputParameters:
      - type: object
        mapping: $.
    - name: get-model
      description: Get detailed information about a specific model.
      hints:
        readOnly: true
        openWorld: true
      call: hf-hub.get-model
      with:
        repo_id: tools.repo_id
      outputParameters:
      - type: object
        mapping: $.
    - name: get-model-revision
      description: Get model information at a specific revision or branch.
      hints:
        readOnly: true
        openWorld: true
      call: hf-hub.get-model-revision
      with:
        repo_id: tools.repo_id
        revision: tools.revision
      outputParameters:
      - type: object
        mapping: $.
    - name: list-datasets
      description: List and search datasets on the Hub.
      hints:
        readOnly: true
        openWorld: true
      call: hf-hub.list-datasets
      with:
        search: tools.search
        author: tools.author
        filter: tools.filter
        sort: tools.sort
        limit: tools.limit
      outputParameters:
      - type: object
        mapping: $.
    - name: get-dataset
      description: Get detailed information about a specific dataset.
      hints:
        readOnly: true
        openWorld: true
      call: hf-hub.get-dataset
      with:
        repo_id: tools.repo_id
      outputParameters:
      - type: object
        mapping: $.
    - name: get-dataset-parquet
      description: Get parquet file URLs for a dataset.
      hints:
        readOnly: true
      call: hf-hub.get-dataset-parquet
      with:
        repo_id: tools.repo_id
      outputParameters:
      - type: object
        mapping: $.
    - name: list-spaces
      description: List and search Spaces on the Hub.
      hints:
        readOnly: true
        openWorld: true
      call: hf-hub.list-spaces
      with:
        search: tools.search
        author: tools.author
        sort: tools.sort
        limit: tools.limit
      outputParameters:
      - type: object
        mapping: $.
    - name: get-space
      description: Get detailed information about a specific Space.
      hints:
        readOnly: true
        openWorld: true
      call: hf-hub.get-space
      with:
        repo_id: tools.repo_id
      outputParameters:
      - type: object
        mapping: $.
    - name: create-repo
      description: Create a new model, dataset, or Space repository on the Hub.
      hints:
        readOnly: false
      call: hf-hub.create-repo
      with:
        type: tools.type
        name: tools.name
        organization: tools.organization
        private: tools.private
      outputParameters:
      - type: object
        mapping: $.
    - name: delete-repo
      description: Delete a repository from the Hub.
      hints:
        readOnly: false
        destructive: true
      call: hf-hub.delete-repo
      with:
        type: tools.type
        name: tools.name
        organization: tools.organization
      outputParameters:
      - type: object
        mapping: $.
    - name: update-repo-settings
      description: Update settings for a repository.
      hints:
        readOnly: false
        idempotent: true
      call: hf-hub.update-repo-settings
      with:
        repo_type: tools.repo_type
        repo_id: tools.repo_id
        private: tools.private
      outputParameters:
      - type: object
        mapping: $.
    - name: whoami
      description: Get information about the authenticated user.
      hints:
        readOnly: true
      call: hf-hub.whoami
      outputParameters:
      - type: object
        mapping: $.
    - name: list-model-tags
      description: List all available model tags grouped by type.
      hints:
        readOnly: true
      call: hf-hub.list-model-tags
      outputParameters:
      - type: object
        mapping: $.
    - name: list-dataset-tags
      description: List all available dataset tags grouped by type.
      hints:
        readOnly: true
      call: hf-hub.list-dataset-tags
      outputParameters:
      - type: object
        mapping: $.
    - name: check-dataset-validity
      description: Check if a dataset is valid and available on the Hub.
      hints:
        readOnly: true
      call: hf-dataset-viewer.is-valid
      with:
        dataset: tools.dataset
      outputParameters:
      - type: object
        mapping: $.
    - name: get-dataset-splits
      description: Get the list of splits for a dataset.
      hints:
        readOnly: true
      call: hf-dataset-viewer.get-splits
      with:
        dataset: tools.dataset
      outputParameters:
      - type: object
        mapping: $.
    - name: preview-dataset-rows
      description: Get the first rows of a dataset split for preview.
      hints:
        readOnly: true
      call: hf-dataset-viewer.get-first-rows
      with:
        dataset: tools.dataset
        config: tools.config
        split: tools.split
      outputParameters:
      - type: object
        mapping: $.
    - name: get-dataset-rows
      description: Get rows from a dataset split with pagination.
      hints:
        readOnly: true
      call: hf-dataset-viewer.get-rows
      with:
        dataset: tools.dataset
        config: tools.config
        split: tools.split
        offset: tools.offset
        length: tools.length
      outputParameters:
      - type: object
        mapping: $.
    - name: search-dataset
      description: Search for rows matching a query in a dataset.
      hints:
        readOnly: true
      call: hf-dataset-viewer.search-rows
      with:
        dataset: tools.dataset
        config: tools.config
        split: tools.split
        query: tools.query
      outputParameters:
      - type: object
        mapping: $.
    - name: filter-dataset
      description: Filter dataset rows using a condition.
      hints:
        readOnly: true
      call: hf-dataset-viewer.filter-rows
      with:
        dataset: tools.dataset
        config: tools.config
        split: tools.split
        where: tools.where
      outputParameters:
      - type: object
        mapping: $.
    - name: get-dataset-size
      description: Get size information for a dataset.
      hints:
        readOnly: true
      call: hf-dataset-viewer.get-dataset-size
      with:
        dataset: tools.dataset
      outputParameters:
      - type: object
        mapping: $.
    - name: get-dataset-statistics
      description: Get statistical information about a dataset split.
      hints:
        readOnly: true
      call: hf-dataset-viewer.get-statistics
      with:
        dataset: tools.dataset
        config: tools.config
        split: tools.split
      outputParameters:
      - type: object
        mapping: $.
    - name: get-croissant-metadata
      description: Get Croissant metadata for a dataset.
      hints:
        readOnly: true
      call: hf-dataset-viewer.get-croissant-metadata
      with:
        dataset: tools.dataset
      outputParameters:
      - type: object
        mapping: $.
