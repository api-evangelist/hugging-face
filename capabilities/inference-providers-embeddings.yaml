naftiko: 1.0.0-alpha2
info:
  label: Hugging Face Inference Providers API — Embeddings
  description: 'Hugging Face Inference Providers API — Embeddings. 1 operations. Lead operation: Create Embeddings. Self-contained
    Naftiko capability covering one Hugging Face business surface.'
  tags:
  - Hugging Face
  - Embeddings
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    HUGGING_FACE_API_KEY: HUGGING_FACE_API_KEY
capability:
  consumes:
  - type: http
    namespace: inference-providers-embeddings
    baseUri: https://router.huggingface.co
    description: Hugging Face Inference Providers API — Embeddings business capability. Self-contained, no shared references.
    resources:
    - name: v1-embeddings
      path: /v1/embeddings
      operations:
      - name: createembeddings
        method: POST
        description: Create Embeddings
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    authentication:
      type: bearer
      token: '{{env.HUGGING_FACE_API_KEY}}'
  exposes:
  - type: rest
    namespace: inference-providers-embeddings-rest
    port: 8080
    description: REST adapter for Hugging Face Inference Providers API — Embeddings. One Spectral-compliant resource per consumed
      operation, prefixed with /v1.
    resources:
    - path: /v1/v1/embeddings
      name: v1-embeddings
      description: REST surface for v1-embeddings.
      operations:
      - method: POST
        name: createembeddings
        description: Create Embeddings
        call: inference-providers-embeddings.createembeddings
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: inference-providers-embeddings-mcp
    port: 9090
    transport: http
    description: MCP adapter for Hugging Face Inference Providers API — Embeddings. One tool per consumed operation, routed
      inline through this capability's consumes block.
    tools:
    - name: create-embeddings
      description: Create Embeddings
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: inference-providers-embeddings.createembeddings
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
