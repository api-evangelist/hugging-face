      - label: GPU - NVIDIA A100 (1x, 80GB)
        name: gpu_a100
        type: metered
        metric: instance-hour
        limit: -1
        timeFrame: usage
        geo: global
        unit: 1
        price: $2.50
        userMultiplied: false
      - label: GPU - NVIDIA H100 (1x, 80GB)
