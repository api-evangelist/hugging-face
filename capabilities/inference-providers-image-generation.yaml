naftiko: 1.0.0-alpha2
info:
  label: Hugging Face Inference Providers API — Image Generation
  description: 'Hugging Face Inference Providers API — Image Generation. 1 operations. Lead operation: Generate Images. Self-contained
    Naftiko capability covering one Hugging Face business surface.'
  tags:
  - Hugging Face
  - Image Generation
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    HUGGING_FACE_API_KEY: HUGGING_FACE_API_KEY
capability:
  consumes:
  - type: http
    namespace: inference-providers-image-generation
    baseUri: https://router.huggingface.co
    description: Hugging Face Inference Providers API — Image Generation business capability. Self-contained, no shared references.
    resources:
    - name: v1-images-generations
      path: /v1/images/generations
      operations:
      - name: createimagegeneration
        method: POST
        description: Generate Images
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    authentication:
      type: bearer
      token: '{{env.HUGGING_FACE_API_KEY}}'
  exposes:
  - type: rest
    namespace: inference-providers-image-generation-rest
    port: 8080
    description: REST adapter for Hugging Face Inference Providers API — Image Generation. One Spectral-compliant resource
      per consumed operation, prefixed with /v1.
    resources:
    - path: /v1/v1/images/generations
      name: v1-images-generations
      description: REST surface for v1-images-generations.
      operations:
      - method: POST
        name: createimagegeneration
        description: Generate Images
        call: inference-providers-image-generation.createimagegeneration
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: inference-providers-image-generation-mcp
    port: 9090
    transport: http
    description: MCP adapter for Hugging Face Inference Providers API — Image Generation. One tool per consumed operation,
      routed inline through this capability's consumes block.
    tools:
    - name: generate-images
      description: Generate Images
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: inference-providers-image-generation.createimagegeneration
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
