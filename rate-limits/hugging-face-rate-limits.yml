specification: API Commons Rate Limits
specificationVersion: '0.1'
schema: https://raw.githubusercontent.com/api-evangelist/interface-research/main/schema/api-commons.yml#/$defs/RateLimits
provider: Hugging Face
providerId: hugging-face
created: '2026-05-04'
modified: '2026-05-05'
reconciled: true
tags:
  - Rate Limiting
  - AI
  - Inference
  - Machine Learning
description: Hugging Face does not publish a single account-wide requests-per-second number. Limits
  are enforced per-account/per-token via monthly Inference Providers credits ($0.10 Free, $2 PRO,
  $2/seat Team & Enterprise). Hub API and Inference Endpoints quotas are tracked as instance counts
  (raise via support). Higher-throughput needs use Inference Endpoints (dedicated capacity) or
  partner-provider keys directly. Rate limits scale with subscription tier.
sources:
  - https://huggingface.co/docs/inference-providers/pricing
  - https://huggingface.co/docs/inference-endpoints/pricing
  - https://huggingface.co/docs/api-inference/index
  - https://huggingface.co/pricing
responseCodes:
  throttled: 429
  quotaExceeded: 429
  serviceUnavailable: 503
limits:
  - name: Inference Providers monthly credits (Free)
    scope: account
    metric: USD_per_month
    limit: 0.10
    timeFrame: month
    notes: Free users can purchase additional credits to continue past the monthly allotment.
  - name: Inference Providers monthly credits (PRO)
    scope: account
    metric: USD_per_month
    limit: 2.00
    timeFrame: month
    notes: PRO subscribers receive 20x the inference credits of Free users.
  - name: Inference Providers monthly credits (Team / Enterprise)
    scope: organization
    metric: USD_per_seat_per_month
    limit: 2.00
    timeFrame: month
    notes: Pooled across all organization members; bill via X-HF-Bill-To header.
  - name: Inference Endpoints instance quota
    scope: account
    metric: concurrent_instances
    limit: see https://ui.endpoints.huggingface.co quotas page
    notes: Paused endpoints do not count; scaled-to-zero endpoints still count. Raise via support.
  - name: Hub API rate limits
    scope: api-key
    metric: requests_per_minute
    limit: not publicly published; scales with account tier (Free / PRO / Team / Enterprise)
  - name: ZeroGPU quota (Free)
    scope: account
    metric: GPU_seconds_per_day
    limit: dynamic; PRO users receive 8x the Free quota
policies:
  - name: Backoff Strategy
    description: Honor 429 responses with exponential backoff and jitter. Use the Retry-After header
      when present.
  - name: Credit Exhaustion
    description: After monthly credits are exhausted, requests can continue under pay-as-you-go by
      purchasing additional credits via the billing settings page.
  - name: Pass-Through Provider Limits
    description: When routing through Inference Providers, partner-provider rate limits and content
      policies also apply (e.g. Cerebras, Together, Replicate). Hugging Face does not add markup but
      forwards provider-imposed throttling.
  - name: Custom Provider Key
    description: Users can supply their own provider key in HF settings to bypass HF billing/credit
      limits and be billed directly by the provider.
  - name: Organization Billing
    description: Team / Enterprise organizations can centralize billing and set spending limits via
      the X-HF-Bill-To header.
  - name: Quota Increases
    description: Inference Endpoints and Spaces hardware quotas can be raised by contacting api-enterprise@huggingface.co.
maintainers:
  - FN: Kin Lane
    email: kin@apievangelist.com
