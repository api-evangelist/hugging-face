naftiko: 1.0.0-alpha2
info:
  label: Hugging Face Hub API — Spaces
  description: 'Hugging Face Hub API — Spaces. 2 operations. Lead operation: List Spaces on the Hub. Self-contained Naftiko
    capability covering one Hugging Face business surface.'
  tags:
  - Hugging Face
  - Spaces
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    HUGGING_FACE_API_KEY: HUGGING_FACE_API_KEY
capability:
  consumes:
  - type: http
    namespace: hub-spaces
    baseUri: https://huggingface.co/api
    description: Hugging Face Hub API — Spaces business capability. Self-contained, no shared references.
    resources:
    - name: spaces
      path: /spaces
      operations:
      - name: listspaces
        method: GET
        description: List Spaces on the Hub
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: search
          in: query
          type: string
          description: Full-text search query
        - name: author
          in: query
          type: string
          description: Filter by Space author or organization
        - name: filter
          in: query
          type: string
          description: Filter by tags
        - name: sort
          in: query
          type: string
          description: Property to sort results by
        - name: direction
          in: query
          type: string
          description: Sort direction
        - name: limit
          in: query
          type: integer
          description: Number of results to return
    - name: spaces-repo_id
      path: /spaces/{repo_id}
      operations:
      - name: getspace
        method: GET
        description: Get Space Information
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: repo_id
          in: path
          type: string
          description: The Space repository ID
          required: true
    authentication:
      type: bearer
      token: '{{env.HUGGING_FACE_API_KEY}}'
  exposes:
  - type: rest
    namespace: hub-spaces-rest
    port: 8080
    description: REST adapter for Hugging Face Hub API — Spaces. One Spectral-compliant resource per consumed operation, prefixed
      with /v1.
    resources:
    - path: /v1/spaces
      name: spaces
      description: REST surface for spaces.
      operations:
      - method: GET
        name: listspaces
        description: List Spaces on the Hub
        call: hub-spaces.listspaces
        with:
          search: rest.search
          author: rest.author
          filter: rest.filter
          sort: rest.sort
          direction: rest.direction
          limit: rest.limit
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/spaces/{repo-id}
      name: spaces-repo-id
      description: REST surface for spaces-repo_id.
      operations:
      - method: GET
        name: getspace
        description: Get Space Information
        call: hub-spaces.getspace
        with:
          repo_id: rest.repo_id
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: hub-spaces-mcp
    port: 9090
    transport: http
    description: MCP adapter for Hugging Face Hub API — Spaces. One tool per consumed operation, routed inline through this
      capability's consumes block.
    tools:
    - name: list-spaces-hub
      description: List Spaces on the Hub
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: hub-spaces.listspaces
      with:
        search: tools.search
        author: tools.author
        filter: tools.filter
        sort: tools.sort
        direction: tools.direction
        limit: tools.limit
      outputParameters:
      - type: object
        mapping: $.
    - name: get-space-information
      description: Get Space Information
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: hub-spaces.getspace
      with:
        repo_id: tools.repo_id
      outputParameters:
      - type: object
        mapping: $.
