}

"""Extended public profile data for a user."""
type UserProfile {
  username: String!
  fullname: String
  bio: String
  location: String
  company: String
  websiteUrl: URL
  githubUsername: String
  twitterUsername: String
  avatarUrl: URL
  isPro: Boolean
