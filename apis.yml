- type: Features
  data:
  - name: Model Inference
    description: Run inference on 200,000+ ML models with a simple HTTP request across
      NLP, vision, audio, and multimodal tasks.
  - name: Hub Repository Management
    description: Programmatically manage models, datasets, and spaces including creation,
      versioning, and access control.
  - name: Dedicated Endpoints
    description: Deploy models on dedicated infrastructure with autoscaling, custom
      hardware, and private networking.
  - name: Multi-Provider Routing
    description: Unified OpenAI-compatible API routing to 15+ inference providers
      with automatic model selection.
  - name: Dataset Exploration
    description: Query, search, filter, and visualize datasets without downloading
      via the Dataset Viewer API.
  - name: Text Generation Inference
    description: High-performance LLM serving with streaming, tool calling, structured
      output, and grammar constraints.
  - name: OpenAI Compatibility
    description: Drop-in replacement for OpenAI API with chat completions, embeddings,
      and image generation endpoints.
- type: UseCases
  data:
  - name: ML Model Prototyping
    description: Rapidly prototype AI applications by running inference on pre-trained
      models without infrastructure setup.
  - name: Production ML Deployment
    description: Deploy and scale ML models for production workloads with dedicated
      endpoints and autoscaling.
  - name: Dataset Curation
    description: Explore, validate, and curate ML datasets programmatically for training
      pipeline automation.
  - name: AI Application Development
    description: Build AI-powered applications using unified inference APIs with multi-provider
      routing.
  - name: Model Benchmarking
    description: Compare model performance across providers and hardware configurations
      for optimization.
- type: Integrations
  data:
  - name: AWS
    description: Deploy inference endpoints on AWS with SageMaker integration and
      GPU instances.
  - name: Google Cloud
    description: Route inference to Google Cloud TPUs and GPUs through the providers
      API.
  - name: Azure
    description: Deploy models on Azure infrastructure with managed endpoint support.
  - name: LangChain
    description: Use Hugging Face models as LangChain LLM and embedding providers.
  - name: Gradio
    description: Build interactive ML demos with Gradio and deploy as Hugging Face
      Spaces.
