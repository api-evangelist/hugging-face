specification: API Commons Plans
specificationVersion: '0.1'
schema: https://raw.githubusercontent.com/api-evangelist/interface-research/main/schema/api-commons.yml#/$defs/Plans
provider: Hugging Face
providerId: hugging-face
created: '2026-05-04'
modified: '2026-05-05'
reconciled: true
tags:
  - AI
  - Machine Learning
  - Inference
  - Model Hub
  - Datasets
description: Hugging Face uses a hybrid pricing model. Account subscriptions (Free, PRO, Team, Enterprise)
  layer on top of usage-based pricing for Inference Providers (pay-as-you-go), Inference Endpoints
  (per-instance-hour), and Spaces hardware (per-hour). Storage is metered in TB/month with volume
  discounts. Subscriptions include monthly inference credits that pass through provider rates with
  no markup.
sources:
  - https://huggingface.co/pricing
  - https://huggingface.co/docs/inference-providers/pricing
  - https://huggingface.co/docs/inference-endpoints/pricing
plans:
  - id: hugging-face-free
    name: Free
    type: freemium
    description: Free Hub access for collaboration and learning. Includes $0.10/month in Inference
      Providers credits.
    entries:
      - label: Inference Providers monthly credits
        name: inference_credits
        type: quota
        metric: USD
        limit: 0.10
        timeFrame: month
        geo: global
        unit: 1
        price: '0.00'
        userMultiplied: false
    elements:
      - name: Hub access (models, datasets, Spaces)
      - name: Community support
      - name: Public repos
      - name: ZeroGPU access (limited quota)
  - id: hugging-face-pro
    name: PRO
    type: subscription
    description: Individual professional tier with 10x private storage, 2x public storage, 20x inference
      credits, 8x ZeroGPU quota, and Spaces Dev Mode.
    entries:
      - label: PRO subscription
        name: pro_subscription
        type: subscription
        metric: month
        limit: -1
        timeFrame: month
        geo: global
        unit: 1
        price: '$9'
        userMultiplied: false
      - label: Inference Providers monthly credits
        name: inference_credits
        type: quota
        metric: USD
        limit: 2.00
        timeFrame: month
        geo: global
        unit: 1
        price: included
        userMultiplied: false
    elements:
      - name: 10x private storage vs Free
      - name: 2x public storage vs Free
      - name: 20x Inference Providers credits
      - name: 8x ZeroGPU quota
      - name: Spaces Dev Mode
      - name: Higher rate limits
  - id: hugging-face-team
    name: Team
    type: subscription
    description: Per-seat plan for organizations with SSO, audit logs, storage regions, resource groups,
      and analytics.
    entries:
      - label: Team seat
        name: team_seat
        type: subscription
        metric: seat
        limit: -1
        timeFrame: month
        geo: global
        unit: 1
        price: '$20'
        userMultiplied: true
      - label: Inference Providers credits per seat
        name: inference_credits_per_seat
        type: quota
        metric: USD
        limit: 2.00
        timeFrame: month
        geo: global
        unit: 1
        price: included
        userMultiplied: true
    elements:
      - name: SSO
      - name: Storage regions (US, EU)
      - name: Audit logs
      - name: Resource groups
      - name: Analytics
      - name: Advanced compute
  - id: hugging-face-enterprise
    name: Enterprise Hub
    type: enterprise
    description: Enterprise per-seat plan with the highest limits, SCIM provisioning, dedicated support,
      and contractual terms.
    entries:
      - label: Enterprise seat
        name: enterprise_seat
        type: subscription
        metric: seat
        limit: -1
        timeFrame: month
        geo: global
        unit: 1
        price: '$50+'
        userMultiplied: true
      - label: Inference Providers credits per seat
        name: inference_credits_per_seat
        type: quota
        metric: USD
        limit: 2.00
        timeFrame: month
        geo: global
        unit: 1
        price: included
        userMultiplied: true
    elements:
      - name: Highest rate limits
      - name: SCIM provisioning
      - name: Dedicated support
      - name: Audit logs and compliance
      - name: Storage regions
  - id: hugging-face-inference-providers
    name: Inference Providers (Pay-As-You-Go)
    type: usage-based
    description: Routed access to 200+ models across partner inference providers (Cerebras, Cohere,
      Fireworks, Groq, Together, Replicate, fal, Sambanova, etc). Pass-through provider rates with
      no Hugging Face markup.
    entries:
      - label: Inference request (routed)
        name: inference_request
        type: metered
        metric: token
        limit: -1
        timeFrame: usage
        geo: global
        unit: 1
        price: see provider rate card
        userMultiplied: false
    elements:
      - name: 200+ models across multiple providers
      - name: OpenAI-compatible chat completions endpoint
      - name: Auto provider selection (fastest / cheapest / preferred)
      - name: No additional Hugging Face markup
  - id: hugging-face-inference-endpoints
    name: Inference Endpoints
    type: usage-based
    description: Dedicated managed inference deployments billed per replica-hour by hardware tier.
    entries:
