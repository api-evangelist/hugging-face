      - Hub
      - Models
      - Repository Management
    serviceName: Hugging Face Hub API
    serviceCategory: API
  - name: Hugging Face Inference Endpoints API
    baseURL: https://api.endpoints.huggingface.cloud
    tags:
      - Deployment
      - Enterprise
      - Inference
      - Managed Service
    serviceName: Hugging Face Inference Endpoints API
    serviceCategory: API
  - name: Hugging Face Inference Providers API
    baseURL: https://router.huggingface.co/v1
    tags:
      - AI
      - Inference
      - OpenAI Compatible
      - Providers
    serviceName: Hugging Face Inference Providers API
