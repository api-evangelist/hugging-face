naftiko: "1.0.0-alpha1"

info:
  label: "Hugging Face Inference Endpoints API"
  description: "Deploy and scale machine learning models with dedicated, secure infrastructure."
  tags:
    - Hugging Face
    - Deployment
    - Inference
    - Infrastructure
  created: "2026-04-18"
  modified: "2026-04-18"

binds:
  - namespace: env
    keys:
      HF_API_TOKEN: HF_API_TOKEN

capability:
  consumes:
    - type: http
      namespace: hf-endpoints
      baseUri: https://api.endpoints.huggingface.cloud/v2
      description: "Deploy and manage dedicated inference endpoints."
      authentication:
        type: bearer
        token: "{{HF_API_TOKEN}}"
      resources:
        - name: endpoints
          path: /endpoint/{namespace}
          description: "Manage inference endpoints"
          operations:
            - name: list-endpoints
              method: GET
              description: "List all Inference Endpoints for a namespace."
              inputParameters:
                - name: namespace
                  in: path
                  type: string
                  required: true
                  description: "User or organization namespace"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: create-endpoint
              method: POST
              description: "Create a new Inference Endpoint."
              inputParameters:
                - name: namespace
                  in: path
                  type: string
                  required: true
                  description: "User or organization namespace"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
              body:
                type: json
                data:
                  name: "{{tools.name}}"
                  model: "{{tools.model}}"
                  provider: "{{tools.provider}}"
                  region: "{{tools.region}}"
                  type: "{{tools.type}}"
        - name: endpoint-by-name
          path: /endpoint/{namespace}/{endpoint_name}
          description: "Manage individual endpoints"
          operations:
            - name: get-endpoint
              method: GET
              description: "Get details of a specific endpoint."
              inputParameters:
                - name: namespace
                  in: path
                  type: string
                  required: true
                  description: "User or organization namespace"
                - name: endpoint_name
                  in: path
                  type: string
                  required: true
                  description: "The endpoint name"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: update-endpoint
              method: PUT
              description: "Update an existing endpoint."
              inputParameters:
                - name: namespace
                  in: path
                  type: string
                  required: true
                  description: "User or organization namespace"
                - name: endpoint_name
                  in: path
                  type: string
                  required: true
                  description: "The endpoint name"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
              body:
                type: json
                data:
                  model: "{{tools.model}}"
                  type: "{{tools.type}}"
            - name: delete-endpoint
              method: DELETE
              description: "Delete an endpoint."
              inputParameters:
                - name: namespace
                  in: path
                  type: string
                  required: true
                  description: "User or organization namespace"
                - name: endpoint_name
                  in: path
                  type: string
                  required: true
                  description: "The endpoint name"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
        - name: endpoint-pause
          path: /endpoint/{namespace}/{endpoint_name}/pause
          description: "Pause an endpoint"
          operations:
            - name: pause-endpoint
              method: POST
              description: "Pause a running endpoint."
              inputParameters:
                - name: namespace
                  in: path
                  type: string
                  required: true
                  description: "User or organization namespace"
                - name: endpoint_name
                  in: path
                  type: string
                  required: true
                  description: "The endpoint name"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
        - name: endpoint-resume
          path: /endpoint/{namespace}/{endpoint_name}/resume
          description: "Resume an endpoint"
          operations:
            - name: resume-endpoint
              method: POST
              description: "Resume a paused endpoint."
              inputParameters:
                - name: namespace
                  in: path
                  type: string
                  required: true
                  description: "User or organization namespace"
                - name: endpoint_name
                  in: path
                  type: string
                  required: true
                  description: "The endpoint name"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
        - name: endpoint-scale-to-zero
          path: /endpoint/{namespace}/{endpoint_name}/scale-to-zero
          description: "Scale endpoint to zero"
          operations:
            - name: scale-to-zero
              method: POST
              description: "Scale an endpoint to zero replicas."
              inputParameters:
                - name: namespace
                  in: path
                  type: string
                  required: true
                  description: "User or organization namespace"
                - name: endpoint_name
                  in: path
                  type: string
                  required: true
                  description: "The endpoint name"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
        - name: endpoint-logs
          path: /endpoint/{namespace}/{endpoint_name}/logs
          description: "Get endpoint logs"
          operations:
            - name: get-endpoint-logs
              method: GET
              description: "Get logs for an endpoint."
              inputParameters:
                - name: namespace
                  in: path
                  type: string
                  required: true
                  description: "User or organization namespace"
                - name: endpoint_name
                  in: path
                  type: string
                  required: true
                  description: "The endpoint name"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
        - name: endpoint-metrics
          path: /endpoint/{namespace}/{endpoint_name}/metrics
          description: "Get endpoint metrics"
          operations:
            - name: get-endpoint-metrics
              method: GET
              description: "Get metrics for an endpoint."
              inputParameters:
                - name: namespace
                  in: path
                  type: string
                  required: true
                  description: "User or organization namespace"
                - name: endpoint_name
                  in: path
                  type: string
                  required: true
                  description: "The endpoint name"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
        - name: providers
          path: /provider
          description: "List cloud providers"
          operations:
            - name: list-providers
              method: GET
              description: "List available cloud providers and hardware."
              inputParameters: []
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

  exposes:
    - type: rest
      port: 8102
      namespace: hf-endpoints-api
      resources:
        - path: /v1/endpoints/{namespace}
          name: endpoints
          description: "Manage endpoints"
          operations:
            - method: GET
              name: list-endpoints
              description: "List all endpoints"
              call: "hf-endpoints.list-endpoints"
              with:
                namespace: "rest.namespace"
              outputParameters:
                - type: object
                  mapping: "$."

    - type: mcp
      port: 9102
      namespace: hf-endpoints-mcp
      transport: http
      tools:
        - name: list-endpoints
          description: "List all dedicated inference endpoints."
          hints:
            readOnly: true
            openWorld: true
          call: "hf-endpoints.list-endpoints"
          with:
            namespace: "tools.namespace"
          outputParameters:
            - type: object
              mapping: "$."
        - name: create-endpoint
          description: "Create a new dedicated inference endpoint."
          hints:
            readOnly: false
          call: "hf-endpoints.create-endpoint"
          with:
            namespace: "tools.namespace"
            name: "tools.name"
            model: "tools.model"
            provider: "tools.provider"
            region: "tools.region"
            type: "tools.type"
          outputParameters:
            - type: object
              mapping: "$."
        - name: get-endpoint
          description: "Get details of a specific endpoint."
          hints:
            readOnly: true
            openWorld: true
          call: "hf-endpoints.get-endpoint"
          with:
            namespace: "tools.namespace"
            endpoint_name: "tools.endpoint_name"
          outputParameters:
            - type: object
              mapping: "$."
        - name: update-endpoint
          description: "Update an existing endpoint configuration."
          hints:
            readOnly: false
            idempotent: true
          call: "hf-endpoints.update-endpoint"
          with:
            namespace: "tools.namespace"
            endpoint_name: "tools.endpoint_name"
            model: "tools.model"
            type: "tools.type"
          outputParameters:
            - type: object
              mapping: "$."
        - name: delete-endpoint
          description: "Delete a dedicated inference endpoint."
          hints:
            readOnly: false
            destructive: true
          call: "hf-endpoints.delete-endpoint"
          with:
            namespace: "tools.namespace"
            endpoint_name: "tools.endpoint_name"
          outputParameters:
            - type: object
              mapping: "$."
        - name: pause-endpoint
          description: "Pause a running endpoint to stop billing."
          hints:
            readOnly: false
          call: "hf-endpoints.pause-endpoint"
          with:
            namespace: "tools.namespace"
            endpoint_name: "tools.endpoint_name"
          outputParameters:
            - type: object
              mapping: "$."
        - name: resume-endpoint
          description: "Resume a paused endpoint."
          hints:
            readOnly: false
          call: "hf-endpoints.resume-endpoint"
          with:
            namespace: "tools.namespace"
            endpoint_name: "tools.endpoint_name"
          outputParameters:
            - type: object
              mapping: "$."
        - name: scale-to-zero
          description: "Scale an endpoint to zero replicas."
          hints:
            readOnly: false
          call: "hf-endpoints.scale-to-zero"
          with:
            namespace: "tools.namespace"
            endpoint_name: "tools.endpoint_name"
          outputParameters:
            - type: object
              mapping: "$."
        - name: get-endpoint-logs
          description: "Get logs for an endpoint."
          hints:
            readOnly: true
          call: "hf-endpoints.get-endpoint-logs"
          with:
            namespace: "tools.namespace"
            endpoint_name: "tools.endpoint_name"
          outputParameters:
            - type: object
              mapping: "$."
        - name: get-endpoint-metrics
          description: "Get metrics for an endpoint."
          hints:
            readOnly: true
          call: "hf-endpoints.get-endpoint-metrics"
          with:
            namespace: "tools.namespace"
            endpoint_name: "tools.endpoint_name"
          outputParameters:
            - type: object
              mapping: "$."
        - name: list-providers
          description: "List available cloud providers and hardware options."
          hints:
            readOnly: true
          call: "hf-endpoints.list-providers"
          outputParameters:
            - type: object
              mapping: "$."
