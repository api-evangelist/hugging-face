# ---------------------------------------------------------------------------
# Inference and Pipeline Types
# ---------------------------------------------------------------------------

"""Input payload for a serverless Inference API call."""
type InferenceRequest {
  model: String!
  inputs: JSON!
  parameters: JSON
  options: InferenceOptions
}

"""Options controlling inference execution behavior."""
type InferenceOptions {
  useCache: Boolean
  waitForModel: Boolean
  useGPU: Boolean
}

"""Output payload returned from an Inference API call."""
type InferenceOutput {
  model: String
  computeTime: Float
  output: JSON
  warnings: [String!]
}

"""An ML pipeline task type and its associated metadata."""
type Pipeline {
  task: PipelineTask!
  defaultModel: String
  widgetData: JSON
  isZeroShot: Boolean
  isBranching: Boolean
}

"""Output from a text generation pipeline."""
type TextGeneration {
  generated_text: String!
  details: TextGenerationDetails
}

"""Token-level details for a text generation output."""
type TextGenerationDetails {
  finish_reason: String
  generated_tokens: Int
  seed: Int
  prefill: [TokenDetail!]
  tokens: [TokenDetail!]
}

"""Per-token metadata from a generation or classification output."""
type TokenDetail {
  id: Int!
  text: String!
  logprob: Float
  special: Boolean
}

"""Label and score output from a text classification pipeline."""
type TextClassification {
  label: String!
  score: Float!
}

"""Per-token label from a token classification pipeline."""
type TokenClassification {
  entity: String!
  score: Float!
  index: Int!
  word: String!
  start: Int
  end: Int
}

"""Named entity recognition output with entity type and span."""
type NER {
  entity_group: String!
  score: Float!
  word: String!
  start: Int
  end: Int
}

"""Answer span and confidence from a question-answering pipeline."""
type QuestionAnswering {
  score: Float!
  start: Int!
  end: Int!
  answer: String!
}

"""Generated summary from a summarization pipeline."""
type SummarizationResult {
  summary_text: String!
}

"""Translated text from a translation pipeline."""
type Translation {
  translation_text: String!
}

"""Embedding vector from a feature extraction pipeline."""
type FeatureExtraction {
  embedding: [[Float!]!]!
  model: String
}

"""Label and confidence score from an image classification pipeline."""
type ImageClassification {
  label: String!
  score: Float!
}

"""Bounding box and label from an object detection pipeline."""
type ObjectDetection {
  label: String!
  score: Float!
  box: BoundingBox!
}

"""A normalized bounding box in image coordinates."""
type BoundingBox {
  xmin: Float!
  ymin: Float!
  xmax: Float!
  ymax: Float!
}

"""Mask and label from an image segmentation pipeline."""
type Segmentation {
  label: String!
  score: Float!
  mask: String
}

"""Depth map from a monocular depth estimation pipeline."""
type DepthEstimation {
  estimated_depth: [[Float!]!]
  depth: String
}

"""Label and score from an audio classification pipeline."""
type AudioClassification {
  label: String!
  score: Float!
}

"""Transcribed text from an automatic speech recognition pipeline."""
type SpeechRecognition {
  text: String!
  chunks: [ASRChunk!]
}

"""Timestamped chunk from an ASR output."""
type ASRChunk {
  text: String!
  timestamp: [Float!]
}

"""Audio blob output from a text-to-speech pipeline."""
type TextToSpeech {
  audio: String!
  contentType: String
}

"""Candidate label scores from a zero-shot classification pipeline."""
type ZeroShotClassification {
  sequence: String!
  labels: [String!]!
  scores: [Float!]!
}

"""Answer extracted from a structured table by a table-QA pipeline."""
type TableQuestion {
  answer: String!
  coordinates: [[Int!]!]
  cells: [String!]
  aggregator: String
}

"""Input document payload for document understanding tasks."""
type Document {
  image: String!
  question: String
  wordBoxes: [[JSON!]!]
}

"""Top token candidates from a masked language model fill-mask pipeline."""
type FillMask {
  score: Float!
  token: Int!
  token_str: String!
  sequence: String!
}

