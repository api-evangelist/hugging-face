}

"""A review submitted on a pull request."""
type Review {
  id: ID!
  author: User
  body: String
  state: String
  submittedAt: DateTime
  comments: [Comment!]
}

"""A discussion thread on a model, dataset, or space."""
type Discussion {
  id: ID!
  number: Int!
  title: String!
  status: String!
  author: User
  createdAt: DateTime
  updatedAt: DateTime
  isPullRequest: Boolean!
