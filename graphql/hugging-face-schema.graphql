# ---------------------------------------------------------------------------
# Version Control Types
# ---------------------------------------------------------------------------

"""A generic repository reference (model, dataset, or space)."""
type Repository {
  id: ID!
  type: RepositoryType!
  name: String!
  author: String!
  sha: String
  private: Boolean!
  lastModified: DateTime
  branches: [Branch!]
  tags: [Tag!]
  commits(limit: Int, offset: Int): [Commit!]
}

"""A named branch within a Hub repository."""
type Branch {
  name: String!
  targetCommit: String!
  ref: String!
}

"""A named tag pointing to a specific commit in a repository."""
type Tag {
  name: String!
  targetCommit: String!
  ref: String!
}

"""A single commit in a repository's history."""
type Commit {
  id: ID!
  sha: String!
  title: String!
  message: String
  authors: [CommitAuthor!]
  date: DateTime
  url: URL
}

"""Full metadata for a commit including file-level changes."""
type CommitInfo {
  id: ID!
  sha: String!
  title: String!
  message: String
  authors: [CommitAuthor!]
  date: DateTime
  url: URL
  filesChanged: [String!]
  summary: String
}

"""Authorship information for a commit."""
type CommitAuthor {
  name: String!
  email: String
  avatar: URL
  user: User
}

# ---------------------------------------------------------------------------
# Collaboration Types
# ---------------------------------------------------------------------------

"""A pull request opened against a Hub repository."""
type PullRequest {
  id: ID!
  number: Int!
  title: String!
  status: PullRequestStatus!
  author: User
  createdAt: DateTime
  updatedAt: DateTime
  targetBranch: String
  sourceBranch: String
  changedFiles: [String!]
  reviews: [Review!]
  comments: [Comment!]
