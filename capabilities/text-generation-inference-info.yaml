naftiko: 1.0.0-alpha2
info:
  label: Hugging Face Text Generation Inference API — Info
  description: 'Hugging Face Text Generation Inference API — Info. 5 operations. Lead operation: Health Check. Self-contained
    Naftiko capability covering one Hugging Face business surface.'
  tags:
  - Hugging Face
  - Info
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    HUGGING_FACE_API_KEY: HUGGING_FACE_API_KEY
capability:
  consumes:
  - type: http
    namespace: text-generation-inference-info
    baseUri: https://api-inference.huggingface.co
    description: Hugging Face Text Generation Inference API — Info business capability. Self-contained, no shared references.
    resources:
    - name: health
      path: /health
      operations:
      - name: healthcheck
        method: GET
        description: Health Check
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: info
      path: /info
      operations:
      - name: getinfo
        method: GET
        description: Get Server Information
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: metrics
      path: /metrics
      operations:
      - name: getmetrics
        method: GET
        description: Get Prometheus Metrics
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: tokenize
      path: /tokenize
      operations:
      - name: tokenize
        method: POST
        description: Tokenize Text
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    - name: v1-models
      path: /v1/models
      operations:
      - name: listmodels
        method: GET
        description: List Available Models
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    authentication:
      type: bearer
      token: '{{env.HUGGING_FACE_API_KEY}}'
  exposes:
  - type: rest
    namespace: text-generation-inference-info-rest
    port: 8080
    description: REST adapter for Hugging Face Text Generation Inference API — Info. One Spectral-compliant resource per consumed
      operation, prefixed with /v1.
    resources:
    - path: /v1/health
      name: health
      description: REST surface for health.
      operations:
      - method: GET
        name: healthcheck
        description: Health Check
        call: text-generation-inference-info.healthcheck
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/info
      name: info
      description: REST surface for info.
      operations:
      - method: GET
        name: getinfo
        description: Get Server Information
        call: text-generation-inference-info.getinfo
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/metrics
      name: metrics
      description: REST surface for metrics.
      operations:
      - method: GET
        name: getmetrics
        description: Get Prometheus Metrics
        call: text-generation-inference-info.getmetrics
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/tokenize
      name: tokenize
      description: REST surface for tokenize.
      operations:
      - method: POST
        name: tokenize
        description: Tokenize Text
        call: text-generation-inference-info.tokenize
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/v1/models
      name: v1-models
      description: REST surface for v1-models.
      operations:
      - method: GET
        name: listmodels
        description: List Available Models
        call: text-generation-inference-info.listmodels
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: text-generation-inference-info-mcp
    port: 9090
    transport: http
    description: MCP adapter for Hugging Face Text Generation Inference API — Info. One tool per consumed operation, routed
      inline through this capability's consumes block.
    tools:
    - name: health-check
      description: Health Check
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: text-generation-inference-info.healthcheck
      outputParameters:
      - type: object
        mapping: $.
    - name: get-server-information
      description: Get Server Information
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: text-generation-inference-info.getinfo
      outputParameters:
      - type: object
        mapping: $.
    - name: get-prometheus-metrics
      description: Get Prometheus Metrics
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: text-generation-inference-info.getmetrics
      outputParameters:
      - type: object
        mapping: $.
    - name: tokenize-text
      description: Tokenize Text
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: text-generation-inference-info.tokenize
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: list-available-models
      description: List Available Models
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: text-generation-inference-info.listmodels
      outputParameters:
      - type: object
        mapping: $.
