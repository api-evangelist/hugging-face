    entries:
      - label: CPU Basic
        name: spaces_cpu_basic
        type: flat
        metric: instance-hour
        limit: -1
        timeFrame: usage
        geo: global
        unit: 1
        price: '0.00'
        userMultiplied: false
      - label: CPU Upgrade (8 vCPU, 32GB)
        name: spaces_cpu_upgrade
