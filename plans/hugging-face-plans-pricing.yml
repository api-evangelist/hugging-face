        timeFrame: usage
        geo: global
        unit: 1
        price: $4.50
        userMultiplied: false
      - label: GPU - NVIDIA H200 (1x, 141GB)
        name: gpu_h200
        type: metered
        metric: instance-hour
        limit: -1
        timeFrame: usage
        geo: global
        unit: 1
        price: $5.00
        userMultiplied: false
      - label: GPU - NVIDIA B200 (1x, 179GB)
        name: gpu_b200
        type: metered
        metric: instance-hour
        limit: -1
        timeFrame: usage
        geo: global
        unit: 1
        price: $9.25
        userMultiplied: false
      - label: GPU - NVIDIA A100 (8x, 640GB)
        name: gpu_a100_8x
