naftiko: 1.0.0-alpha2
info:
  label: Hugging Face Deployment and Operations
  description: Unified workflow for deploying, scaling, and operating ML model inference endpoints on dedicated infrastructure.
    Combines Inference Endpoints management with TGI server monitoring. Used by ML platform engineers and DevOps teams.
  tags:
  - Hugging Face
  - Deployment
  - Operations
  - Infrastructure
  - MLOps
  created: '2026-04-18'
  modified: '2026-05-06'
binds:
- namespace: env
  keys:
    HF_API_TOKEN: HF_API_TOKEN
capability:
  consumes:
  - type: http
    namespace: hf-endpoints
    baseUri: https://api.endpoints.huggingface.cloud/v2
    description: Deploy and manage dedicated inference endpoints.
    authentication:
      type: bearer
      token: '{{HF_API_TOKEN}}'
    resources:
    - name: endpoints
      path: /endpoint/{namespace}
      description: Manage inference endpoints
      operations:
      - name: list-endpoints
        method: GET
        description: List all Inference Endpoints for a namespace.
        inputParameters:
        - name: namespace
          in: path
          type: string
          required: true
          description: User or organization namespace
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: create-endpoint
        method: POST
        description: Create a new Inference Endpoint.
        inputParameters:
        - name: namespace
          in: path
          type: string
          required: true
          description: User or organization namespace
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        body:
          type: json
          data:
            name: '{{tools.name}}'
            model: '{{tools.model}}'
            provider: '{{tools.provider}}'
            region: '{{tools.region}}'
            type: '{{tools.type}}'
    - name: endpoint-by-name
      path: /endpoint/{namespace}/{endpoint_name}
      description: Manage individual endpoints
      operations:
      - name: get-endpoint
        method: GET
        description: Get details of a specific endpoint.
        inputParameters:
        - name: namespace
          in: path
          type: string
          required: true
          description: User or organization namespace
        - name: endpoint_name
          in: path
          type: string
          required: true
          description: The endpoint name
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: update-endpoint
        method: PUT
        description: Update an existing endpoint.
        inputParameters:
        - name: namespace
          in: path
          type: string
          required: true
          description: User or organization namespace
        - name: endpoint_name
          in: path
          type: string
          required: true
          description: The endpoint name
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        body:
          type: json
          data:
            model: '{{tools.model}}'
            type: '{{tools.type}}'
      - name: delete-endpoint
        method: DELETE
        description: Delete an endpoint.
        inputParameters:
        - name: namespace
          in: path
          type: string
          required: true
          description: User or organization namespace
        - name: endpoint_name
          in: path
          type: string
          required: true
          description: The endpoint name
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: endpoint-pause
      path: /endpoint/{namespace}/{endpoint_name}/pause
      description: Pause an endpoint
      operations:
      - name: pause-endpoint
        method: POST
        description: Pause a running endpoint.
        inputParameters:
        - name: namespace
          in: path
          type: string
          required: true
          description: User or organization namespace
        - name: endpoint_name
          in: path
          type: string
          required: true
          description: The endpoint name
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: endpoint-resume
      path: /endpoint/{namespace}/{endpoint_name}/resume
      description: Resume an endpoint
      operations:
      - name: resume-endpoint
        method: POST
        description: Resume a paused endpoint.
        inputParameters:
        - name: namespace
          in: path
          type: string
          required: true
          description: User or organization namespace
        - name: endpoint_name
          in: path
          type: string
          required: true
          description: The endpoint name
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: endpoint-scale-to-zero
      path: /endpoint/{namespace}/{endpoint_name}/scale-to-zero
      description: Scale endpoint to zero
      operations:
      - name: scale-to-zero
        method: POST
        description: Scale an endpoint to zero replicas.
        inputParameters:
        - name: namespace
          in: path
          type: string
          required: true
          description: User or organization namespace
        - name: endpoint_name
          in: path
          type: string
          required: true
          description: The endpoint name
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: endpoint-logs
      path: /endpoint/{namespace}/{endpoint_name}/logs
      description: Get endpoint logs
      operations:
      - name: get-endpoint-logs
        method: GET
        description: Get logs for an endpoint.
        inputParameters:
        - name: namespace
          in: path
          type: string
          required: true
          description: User or organization namespace
        - name: endpoint_name
          in: path
          type: string
          required: true
          description: The endpoint name
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: endpoint-metrics
      path: /endpoint/{namespace}/{endpoint_name}/metrics
      description: Get endpoint metrics
      operations:
      - name: get-endpoint-metrics
        method: GET
        description: Get metrics for an endpoint.
        inputParameters:
        - name: namespace
          in: path
          type: string
          required: true
          description: User or organization namespace
        - name: endpoint_name
          in: path
          type: string
          required: true
          description: The endpoint name
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: providers
      path: /provider
      description: List cloud providers
      operations:
      - name: list-providers
        method: GET
        description: List available cloud providers and hardware.
        inputParameters: []
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
  - type: http
    namespace: hf-tgi
    baseUri: https://api-inference.huggingface.co
    description: High-performance LLM serving with streaming, tool calling, and structured output.
    authentication:
      type: bearer
      token: '{{HF_API_TOKEN}}'
    resources:
    - name: generate
      path: /generate
      description: Generate text
      operations:
      - name: generate
        method: POST
        description: Generate text using the TGI native endpoint.
        inputParameters: []
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        body:
          type: json
          data:
            inputs: '{{tools.inputs}}'
            parameters: '{{tools.parameters}}'
    - name: generate-stream
      path: /generate_stream
      description: Generate text with streaming
      operations:
      - name: generate-stream
        method: POST
        description: Generate text with server-sent events streaming.
        inputParameters: []
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        body:
          type: json
          data:
            inputs: '{{tools.inputs}}'
            parameters: '{{tools.parameters}}'
    - name: chat-completions
      path: /v1/chat/completions
      description: OpenAI-compatible chat completions
      operations:
      - name: chat-completions
        method: POST
        description: Create chat completions using OpenAI-compatible Messages API.
        inputParameters: []
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        body:
          type: json
          data:
            model: '{{tools.model}}'
            messages: '{{tools.messages}}'
            max_tokens: '{{tools.max_tokens}}'
            temperature: '{{tools.temperature}}'
            stream: '{{tools.stream}}'
    - name: completions
      path: /v1/completions
      description: OpenAI-compatible completions
      operations:
      - name: completions
        method: POST
        description: Create text completions.
        inputParameters: []
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        body:
          type: json
          data:
            model: '{{tools.model}}'
            prompt: '{{tools.prompt}}'
            max_tokens: '{{tools.max_tokens}}'
    - name: models
      path: /v1/models
      description: List available models
      operations:
      - name: list-models
        method: GET
        description: List available models on the TGI server.
        inputParameters: []
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: info
      path: /info
      description: Server information
      operations:
      - name: get-info
        method: GET
        description: Get information about the deployed model and server.
        inputParameters: []
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: health
      path: /health
      description: Health check
      operations:
      - name: health-check
        method: GET
        description: Check if the TGI server is healthy.
        inputParameters: []
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: metrics
      path: /metrics
      description: Server metrics
      operations:
      - name: get-metrics
        method: GET
        description: Get Prometheus metrics from the TGI server.
        inputParameters: []
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: tokenize
      path: /tokenize
      description: Tokenize text
      operations:
      - name: tokenize
        method: POST
        description: Tokenize input text and return token IDs.
        inputParameters: []
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        body:
          type: json
          data:
            inputs: '{{tools.inputs}}'
  exposes:
  - type: rest
    port: 8082
    namespace: hf-deployment-api
    description: Unified REST API for ML deployment and operations management.
    resources:
    - path: /v1/endpoints/{namespace}
      name: endpoints
      description: Manage inference endpoints
      operations:
      - method: GET
        name: list-endpoints
        description: List all endpoints
        call: hf-endpoints.list-endpoints
        with:
          namespace: rest.namespace
        outputParameters:
        - type: object
          mapping: $.
      - method: POST
        name: create-endpoint
        description: Create a new endpoint
        call: hf-endpoints.create-endpoint
        with:
          namespace: rest.namespace
          name: rest.name
          model: rest.model
          provider: rest.provider
          region: rest.region
          type: rest.type
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/endpoints/{namespace}/{endpoint_name}
      name: endpoint-details
      description: Individual endpoint operations
      operations:
      - method: GET
        name: get-endpoint
        description: Get endpoint details
        call: hf-endpoints.get-endpoint
        with:
          namespace: rest.namespace
          endpoint_name: rest.endpoint_name
        outputParameters:
        - type: object
          mapping: $.
      - method: PUT
        name: update-endpoint
        description: Update endpoint configuration
        call: hf-endpoints.update-endpoint
        with:
          namespace: rest.namespace
          endpoint_name: rest.endpoint_name
          model: rest.model
          type: rest.type
        outputParameters:
        - type: object
          mapping: $.
      - method: DELETE
        name: delete-endpoint
        description: Delete an endpoint
        call: hf-endpoints.delete-endpoint
        with:
          namespace: rest.namespace
          endpoint_name: rest.endpoint_name
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/endpoints/{namespace}/{endpoint_name}/pause
      name: endpoint-pause
      description: Pause an endpoint
      operations:
      - method: POST
        name: pause-endpoint
        description: Pause a running endpoint
        call: hf-endpoints.pause-endpoint
        with:
          namespace: rest.namespace
          endpoint_name: rest.endpoint_name
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/endpoints/{namespace}/{endpoint_name}/resume
      name: endpoint-resume
      description: Resume an endpoint
      operations:
      - method: POST
        name: resume-endpoint
        description: Resume a paused endpoint
        call: hf-endpoints.resume-endpoint
        with:
          namespace: rest.namespace
          endpoint_name: rest.endpoint_name
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/endpoints/{namespace}/{endpoint_name}/logs
      name: endpoint-logs
      description: Get endpoint logs
      operations:
      - method: GET
        name: get-logs
        description: Get endpoint logs
        call: hf-endpoints.get-endpoint-logs
        with:
          namespace: rest.namespace
          endpoint_name: rest.endpoint_name
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/endpoints/{namespace}/{endpoint_name}/metrics
      name: endpoint-metrics
      description: Get endpoint metrics
      operations:
      - method: GET
        name: get-metrics
        description: Get endpoint metrics
        call: hf-endpoints.get-endpoint-metrics
        with:
          namespace: rest.namespace
          endpoint_name: rest.endpoint_name
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/server/health
      name: server-health
      description: TGI server health
      operations:
      - method: GET
        name: health-check
        description: Check TGI server health
        call: hf-tgi.health-check
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/server/info
      name: server-info
      description: TGI server info
      operations:
      - method: GET
        name: get-info
        description: Get TGI server info
        call: hf-tgi.get-info
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/providers
      name: providers
      description: Cloud providers
      operations:
      - method: GET
        name: list-providers
        description: List available cloud providers
        call: hf-endpoints.list-providers
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    port: 9092
    namespace: hf-deployment-mcp
    transport: http
    description: MCP server for AI-assisted ML deployment and operations management.
    tools:
    - name: list-endpoints
      description: List all dedicated inference endpoints for a namespace.
      hints:
        readOnly: true
        openWorld: true
      call: hf-endpoints.list-endpoints
      with:
        namespace: tools.namespace
      outputParameters:
      - type: object
        mapping: $.
    - name: create-endpoint
      description: Create a new dedicated inference endpoint.
      hints:
        readOnly: false
      call: hf-endpoints.create-endpoint
      with:
        namespace: tools.namespace
        name: tools.name
        model: tools.model
        provider: tools.provider
        region: tools.region
        type: tools.type
      outputParameters:
      - type: object
        mapping: $.
    - name: get-endpoint
      description: Get details of a specific endpoint.
      hints:
        readOnly: true
        openWorld: true
      call: hf-endpoints.get-endpoint
      with:
        namespace: tools.namespace
        endpoint_name: tools.endpoint_name
      outputParameters:
      - type: object
        mapping: $.
    - name: update-endpoint
      description: Update an existing endpoint configuration.
      hints:
        readOnly: false
        idempotent: true
      call: hf-endpoints.update-endpoint
      with:
        namespace: tools.namespace
        endpoint_name: tools.endpoint_name
        model: tools.model
        type: tools.type
      outputParameters:
      - type: object
        mapping: $.
    - name: delete-endpoint
      description: Delete a dedicated inference endpoint.
      hints:
        readOnly: false
        destructive: true
      call: hf-endpoints.delete-endpoint
      with:
        namespace: tools.namespace
        endpoint_name: tools.endpoint_name
      outputParameters:
      - type: object
        mapping: $.
    - name: pause-endpoint
      description: Pause a running endpoint to stop billing.
      hints:
        readOnly: false
      call: hf-endpoints.pause-endpoint
      with:
        namespace: tools.namespace
        endpoint_name: tools.endpoint_name
      outputParameters:
      - type: object
        mapping: $.
    - name: resume-endpoint
      description: Resume a paused endpoint.
      hints:
        readOnly: false
      call: hf-endpoints.resume-endpoint
      with:
        namespace: tools.namespace
        endpoint_name: tools.endpoint_name
      outputParameters:
      - type: object
        mapping: $.
    - name: scale-to-zero
      description: Scale an endpoint to zero replicas.
      hints:
        readOnly: false
      call: hf-endpoints.scale-to-zero
      with:
        namespace: tools.namespace
        endpoint_name: tools.endpoint_name
      outputParameters:
      - type: object
        mapping: $.
    - name: get-endpoint-logs
      description: Get logs for an endpoint.
      hints:
        readOnly: true
      call: hf-endpoints.get-endpoint-logs
      with:
        namespace: tools.namespace
        endpoint_name: tools.endpoint_name
      outputParameters:
      - type: object
        mapping: $.
    - name: get-endpoint-metrics
      description: Get metrics for an endpoint.
      hints:
        readOnly: true
      call: hf-endpoints.get-endpoint-metrics
      with:
        namespace: tools.namespace
        endpoint_name: tools.endpoint_name
      outputParameters:
      - type: object
        mapping: $.
    - name: list-providers
      description: List available cloud providers and hardware options.
      hints:
        readOnly: true
      call: hf-endpoints.list-providers
      outputParameters:
      - type: object
        mapping: $.
    - name: tgi-health-check
      description: Check if the TGI server is healthy and responding.
      hints:
        readOnly: true
      call: hf-tgi.health-check
      outputParameters:
      - type: object
        mapping: $.
    - name: tgi-server-info
      description: Get information about the deployed model and TGI server.
      hints:
        readOnly: true
      call: hf-tgi.get-info
      outputParameters:
      - type: object
        mapping: $.
    - name: tgi-metrics
      description: Get Prometheus metrics from the TGI server.
      hints:
        readOnly: true
      call: hf-tgi.get-metrics
      outputParameters:
      - type: object
        mapping: $.
