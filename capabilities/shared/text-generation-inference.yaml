naftiko: "1.0.0-alpha1"

info:
  label: "Hugging Face Text Generation Inference API"
  description: "High-performance toolkit for deploying and serving large language models with optimized inference."
  tags:
    - Hugging Face
    - Text Generation
    - LLM
    - Inference
  created: "2026-04-18"
  modified: "2026-04-18"

binds:
  - namespace: env
    keys:
      HF_API_TOKEN: HF_API_TOKEN

capability:
  consumes:
    - type: http
      namespace: hf-tgi
      baseUri: https://api-inference.huggingface.co
      description: "High-performance LLM serving with streaming, tool calling, and structured output."
      authentication:
        type: bearer
        token: "{{HF_API_TOKEN}}"
      resources:
        - name: generate
          path: /generate
          description: "Generate text"
          operations:
            - name: generate
              method: POST
              description: "Generate text using the TGI native endpoint."
              inputParameters: []
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
              body:
                type: json
                data:
                  inputs: "{{tools.inputs}}"
                  parameters: "{{tools.parameters}}"
        - name: generate-stream
          path: /generate_stream
          description: "Generate text with streaming"
          operations:
            - name: generate-stream
              method: POST
              description: "Generate text with server-sent events streaming."
              inputParameters: []
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
              body:
                type: json
                data:
                  inputs: "{{tools.inputs}}"
                  parameters: "{{tools.parameters}}"
        - name: chat-completions
          path: /v1/chat/completions
          description: "OpenAI-compatible chat completions"
          operations:
            - name: chat-completions
              method: POST
              description: "Create chat completions using OpenAI-compatible Messages API."
              inputParameters: []
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
              body:
                type: json
                data:
                  model: "{{tools.model}}"
                  messages: "{{tools.messages}}"
                  max_tokens: "{{tools.max_tokens}}"
                  temperature: "{{tools.temperature}}"
                  stream: "{{tools.stream}}"
        - name: completions
          path: /v1/completions
          description: "OpenAI-compatible completions"
          operations:
            - name: completions
              method: POST
              description: "Create text completions."
              inputParameters: []
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
              body:
                type: json
                data:
                  model: "{{tools.model}}"
                  prompt: "{{tools.prompt}}"
                  max_tokens: "{{tools.max_tokens}}"
        - name: models
          path: /v1/models
          description: "List available models"
          operations:
            - name: list-models
              method: GET
              description: "List available models on the TGI server."
              inputParameters: []
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
        - name: info
          path: /info
          description: "Server information"
          operations:
            - name: get-info
              method: GET
              description: "Get information about the deployed model and server."
              inputParameters: []
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
        - name: health
          path: /health
          description: "Health check"
          operations:
            - name: health-check
              method: GET
              description: "Check if the TGI server is healthy."
              inputParameters: []
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
        - name: metrics
          path: /metrics
          description: "Server metrics"
          operations:
            - name: get-metrics
              method: GET
              description: "Get Prometheus metrics from the TGI server."
              inputParameters: []
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
        - name: tokenize
          path: /tokenize
          description: "Tokenize text"
          operations:
            - name: tokenize
              method: POST
              description: "Tokenize input text and return token IDs."
              inputParameters: []
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
              body:
                type: json
                data:
                  inputs: "{{tools.inputs}}"

  exposes:
    - type: rest
      port: 8105
      namespace: hf-tgi-api
      resources:
        - path: /v1/generate
          name: generate
          description: "Text generation"
          operations:
            - method: POST
              name: generate
              description: "Generate text"
              call: "hf-tgi.generate"
              with:
                inputs: "rest.inputs"
                parameters: "rest.parameters"
              outputParameters:
                - type: object
                  mapping: "$."

    - type: mcp
      port: 9105
      namespace: hf-tgi-mcp
      transport: http
      tools:
        - name: generate-text
          description: "Generate text using the TGI native endpoint."
          hints:
            readOnly: true
            openWorld: true
          call: "hf-tgi.generate"
          with:
            inputs: "tools.inputs"
            parameters: "tools.parameters"
          outputParameters:
            - type: object
              mapping: "$."
        - name: chat-completions
          description: "Create chat completions using OpenAI-compatible Messages API."
          hints:
            readOnly: true
            openWorld: true
          call: "hf-tgi.chat-completions"
          with:
            model: "tools.model"
            messages: "tools.messages"
            max_tokens: "tools.max_tokens"
            temperature: "tools.temperature"
            stream: "tools.stream"
          outputParameters:
            - type: object
              mapping: "$."
        - name: get-server-info
          description: "Get information about the deployed model and TGI server."
          hints:
            readOnly: true
          call: "hf-tgi.get-info"
          outputParameters:
            - type: object
              mapping: "$."
        - name: health-check
          description: "Check if the TGI server is healthy."
          hints:
            readOnly: true
          call: "hf-tgi.health-check"
          outputParameters:
            - type: object
              mapping: "$."
        - name: tokenize
          description: "Tokenize input text and return token IDs."
          hints:
            readOnly: true
          call: "hf-tgi.tokenize"
          with:
            inputs: "tools.inputs"
          outputParameters:
            - type: object
              mapping: "$."
